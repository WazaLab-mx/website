<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>WAZA - Instagram Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 1080px;
            height: 1920px;
            background: linear-gradient(180deg, #0D0D0D 0%, #252A34 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .glow-top {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.15) 0%, transparent 70%);
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .glow-bottom {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(8, 217, 214, 0.12) 0%, transparent 70%);
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(249, 247, 247, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 247, 247, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 100px 80px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .top-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            text-align: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-text {
            font-size: 100px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -4px;
            line-height: 1;
        }

        .dot {
            width: 20px;
            height: 20px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 46, 99, 0.8);
        }

        .badge {
            background: rgba(112, 45, 255, 0.15);
            border: 2px solid rgba(112, 45, 255, 0.4);
            color: #702DFF;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .middle-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            text-align: center;
        }

        h1 {
            font-size: 120px;
            font-weight: 900;
            color: #F9F7F7;
            line-height: 1.1;
            letter-spacing: -4px;
        }

        .highlight {
            background: linear-gradient(135deg, #FF2E63 0%, #702DFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 42px;
            font-weight: 700;
            color: #F9F7F7;
            line-height: 1.3;
            letter-spacing: -1px;
        }

        .status-badge {
            background: rgba(8, 217, 214, 0.15);
            border: 2px solid rgba(8, 217, 214, 0.4);
            color: #08D9D6;
            padding: 20px 50px;
            border-radius: 35px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 40px rgba(8, 217, 214, 0.2);
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .cta-area {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px 60px;
            text-align: center;
        }

        .cta-text {
            font-size: 24px;
            font-weight: 600;
            color: rgba(249, 247, 247, 0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .url {
            font-size: 48px;
            font-weight: 800;
            color: #08D9D6;
            letter-spacing: -1px;
        }

        .swipe-indicator {
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(249, 247, 247, 0.4);
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .arrow {
            font-size: 24px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <div class="top-section">
            <div class="brand">
                <div class="logo-text">WAZA</div>
                <div class="dot"></div>
            </div>
            <div class="badge">waza.baby Lab</div>
        </div>

        <div class="middle-section">
            <h1><span class="highlight">ya está</span><br>aquí</h1>
            <div class="subtitle">Ingeniería AI-Native<br>Para la Nueva Era</div>
            <div class="status-badge">Ingeniería AI-Native</div>
        </div>

        <div class="bottom-section">
            <div class="cta-area">
                <div class="cta-text">Visítanos en</div>
                <div class="url">waza.baby</div>
            </div>
            <div class="swipe-indicator">
                <span class="arrow">↑</span>
                Desliza para explorar
            </div>
        </div>
    </div>
</body>
</html>
