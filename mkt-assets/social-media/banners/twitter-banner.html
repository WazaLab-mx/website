<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1500, height=500">
    <title>WAZA - Twitter/X Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 1500px;
            height: 500px;
            background: linear-gradient(135deg, #0D0D0D 0%, #252A34 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(8, 217, 214, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(8, 217, 214, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .accent-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid rgba(255, 46, 99, 0.1);
            border-radius: 50%;
            top: 50%;
            right: 100px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .accent-circle-inner {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 2px solid rgba(8, 217, 214, 0.1);
            border-radius: 50%;
            top: 50%;
            right: 175px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 0 80px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .left-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo-text {
            font-size: 80px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -3px;
            line-height: 1;
        }

        .dot {
            width: 16px;
            height: 16px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 46, 99, 0.8);
        }

        .tagline {
            font-size: 28px;
            font-weight: 700;
            color: #F9F7F7;
            line-height: 1.3;
            letter-spacing: -0.5px;
            max-width: 600px;
        }

        .highlight {
            background: linear-gradient(135deg, #FF2E63 0%, #702DFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        .url {
            font-size: 40px;
            font-weight: 800;
            color: #08D9D6;
            letter-spacing: -1px;
        }

        .badge {
            background: rgba(8, 217, 214, 0.1);
            border: 1px solid rgba(8, 217, 214, 0.3);
            color: #08D9D6;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="accent-circle"></div>
    <div class="accent-circle-inner"></div>

    <div class="container">
        <div class="left-section">
            <div class="brand">
                <div class="logo-text">WAZA</div>
                <div class="dot"></div>
            </div>
            <div class="tagline">
                Technology That Grows<br>
                <span class="highlight">Stronger Through Use</span>
            </div>
        </div>

        <div class="right-section">
            <div class="url">waza.baby</div>
            <div class="badge">AI-Native Lab</div>
        </div>
    </div>
</body>
</html>
