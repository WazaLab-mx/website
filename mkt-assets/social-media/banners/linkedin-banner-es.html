<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1584, height=396">
    <title>WAZA - LinkedIn Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 1584px;
            height: 396px;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .accent-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.1) 0%, transparent 70%);
            top: 50%;
            left: 200px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .accent-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent 0%, #FF2E63 30%, #08D9D6 70%, transparent 100%);
            opacity: 0.5;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 0 80px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-text {
            font-size: 96px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -4px;
            line-height: 1;
        }

        .dot {
            width: 18px;
            height: 18px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 46, 99, 0.8);
        }

        .center-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 60px;
        }

        .tagline {
            font-size: 32px;
            font-weight: 600;
            color: #F9F7F7;
            line-height: 1.4;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .highlight {
            color: #08D9D6;
            font-weight: 700;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .url {
            font-size: 36px;
            font-weight: 800;
            color: #08D9D6;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 600;
            color: rgba(249, 247, 247, 0.5);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="accent-glow"></div>
    <div class="accent-line"></div>

    <div class="container">
        <div class="left-section">
            <div class="logo-text">WAZA</div>
            <div class="dot"></div>
        </div>

        <div class="center-section">
            <div class="tagline">
                IA práctica para negocios<br>que <span class="highlight">no se detienen</span>
            </div>
        </div>

        <div class="right-section">
            <div class="url">waza.baby</div>
            <div class="subtitle">Ingeniería AI-Native</div>
        </div>
    </div>
</body>
</html>
