<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=627">
    <title>WAZA Launch - LinkedIn Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 1200px;
            height: 627px;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .accent-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            pointer-events: none;
        }

        .accent-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(8, 217, 214, 0.1) 0%, transparent 70%);
            bottom: -100px;
            left: -50px;
            pointer-events: none;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 60px 80px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -1px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.6);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            background: rgba(8, 217, 214, 0.1);
            border: 1px solid rgba(8, 217, 214, 0.3);
            color: #08D9D6;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            width: fit-content;
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            color: #F9F7F7;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .highlight {
            background: linear-gradient(135deg, #FF2E63 0%, #702DFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 28px;
            font-weight: 600;
            color: rgba(249, 247, 247, 0.8);
            margin-bottom: 50px;
            line-height: 1.3;
        }

        .features {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature-icon {
            width: 6px;
            height: 6px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 46, 99, 0.5);
        }

        .feature-text {
            font-size: 18px;
            font-weight: 600;
            color: #F9F7F7;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .url {
            font-size: 24px;
            font-weight: 700;
            color: #08D9D6;
            letter-spacing: -0.5px;
        }

        .cta {
            background: linear-gradient(135deg, #FF2E63 0%, #d91e4f 100%);
            color: #F9F7F7;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(255, 46, 99, 0.3);
        }
    </style>
</head>
<body>
    <div class="accent-glow"></div>
    <div class="accent-glow-2"></div>

    <div class="container">
        <div class="header">
            <div class="logo-text">WAZA</div>
            <div class="dot"></div>
        </div>

        <div class="content">
            <div class="badge">Now Live</div>
            <h1>Introducing<br><span class="highlight">waza.baby Lab</span></h1>
            <div class="subtitle">AI-Native Engineering for the Next Era</div>

            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon"></div>
                    <div class="feature-text">Practical AI Tools</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"></div>
                    <div class="feature-text">Custom Development</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"></div>
                    <div class="feature-text">Training & Consulting</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="url">waza.baby</div>
            <div class="cta">Explore the Lab</div>
        </div>
    </div>
</body>
</html>
