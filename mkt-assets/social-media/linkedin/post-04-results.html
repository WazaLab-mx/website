<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=627">
    <title>Results - LinkedIn Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 1200px;
            height: 627px;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1520 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .accent-line-1 {
            position: absolute;
            width: 400px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #FF2E63 50%, transparent 100%);
            top: 100px;
            right: 0;
            opacity: 0.3;
        }

        .accent-line-2 {
            position: absolute;
            width: 300px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #08D9D6 50%, transparent 100%);
            bottom: 150px;
            left: 0;
            opacity: 0.3;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 60px 70px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -0.5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 46, 99, 0.6);
        }

        h1 {
            font-size: 56px;
            font-weight: 900;
            color: #F9F7F7;
            line-height: 1.1;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .highlight {
            background: linear-gradient(135deg, #FF2E63 0%, #702DFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin: 50px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #FF2E63 0%, #702DFF 100%);
        }

        .stat-card:nth-child(2)::before {
            background: linear-gradient(90deg, #08D9D6 0%, #06a8a5 100%);
        }

        .stat-card:nth-child(3)::before {
            background: linear-gradient(90deg, #702DFF 0%, #5a24cc 100%);
        }

        .stat-card:nth-child(4)::before {
            background: linear-gradient(90deg, #FF2E63 0%, #d91e4f 100%);
        }

        .stat-number {
            font-size: 56px;
            font-weight: 900;
            color: #F9F7F7;
            line-height: 1;
            margin-bottom: 12px;
            letter-spacing: -2px;
        }

        .stat-label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(249, 247, 247, 0.6);
            line-height: 1.4;
        }

        .trust-section {
            background: rgba(8, 217, 214, 0.05);
            border: 1px solid rgba(8, 217, 214, 0.15);
            border-radius: 12px;
            padding: 25px 30px;
        }

        .trust-label {
            font-size: 13px;
            font-weight: 700;
            color: #08D9D6;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .trust-clients {
            font-size: 18px;
            font-weight: 600;
            color: #F9F7F7;
            line-height: 1.5;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .url {
            font-size: 20px;
            font-weight: 700;
            color: #08D9D6;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>
    <div class="accent-line-1"></div>
    <div class="accent-line-2"></div>

    <div class="container">
        <div>
            <div class="header">
                <div class="logo-text">WAZA</div>
                <div class="dot"></div>
            </div>

            <h1>Results That <span class="highlight">Matter</span></h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">45%</div>
                <div class="stat-label">Engagement Increase</div>
            </div>

            <div class="stat-card">
                <div class="stat-number">3x</div>
                <div class="stat-label">Productivity Gain</div>
            </div>

            <div class="stat-card">
                <div class="stat-number">60%</div>
                <div class="stat-label">Faster Development</div>
            </div>

            <div class="stat-card">
                <div class="stat-number">30%</div>
                <div class="stat-label">Fewer Support Tickets</div>
            </div>
        </div>

        <div class="trust-section">
            <div class="trust-label">Trusted By</div>
            <div class="trust-clients">Warner Music Group • Leo Burnett Mx • Matraka • Bisonte</div>
        </div>

        <div class="footer">
            <div class="url">waza.baby</div>
        </div>
    </div>
</body>
</html>
