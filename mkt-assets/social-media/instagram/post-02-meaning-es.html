<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>WAZA Significado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            position: relative;
        }

        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: #0D0D0D;
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 0 0 4px #FF2E63;
        }

        .center-logo h1 {
            font-size: 72px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: 2px;
        }

        .center-logo .dot {
            color: #FF2E63;
        }

        .quadrant {
            background: #252A34;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.3s ease;
        }

        .quadrant:nth-child(1) {
            border-top-left-radius: 0;
        }

        .quadrant:nth-child(2) {
            border-top-right-radius: 0;
        }

        .quadrant:nth-child(3) {
            border-bottom-left-radius: 0;
        }

        .quadrant:nth-child(4) {
            border-bottom-right-radius: 0;
        }

        .symbol {
            font-size: 120px;
            font-weight: 900;
            margin-bottom: 30px;
            line-height: 1;
        }

        .quadrant:nth-child(1) .symbol { color: #FF2E63; }
        .quadrant:nth-child(2) .symbol { color: #08D9D6; }
        .quadrant:nth-child(3) .symbol { color: #702DFF; }
        .quadrant:nth-child(4) .symbol { color: #FF2E63; }

        .language {
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .meaning {
            font-size: 28px;
            font-weight: 400;
            color: #F9F7F7;
            opacity: 0.8;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quadrant">
            <div class="symbol">技</div>
            <div class="language">Japonés</div>
            <div class="meaning">Técnica como arte</div>
        </div>
        <div class="quadrant">
            <div class="symbol">EN</div>
            <div class="language">Inglés</div>
            <div class="meaning">Saludo, bienvenida</div>
        </div>
        <div class="quadrant">
            <div class="symbol">SW</div>
            <div class="language">Suajili</div>
            <div class="meaning">Imaginar, visualizar</div>
        </div>
        <div class="quadrant">
            <div class="symbol">ES</div>
            <div class="language">Español</div>
            <div class="meaning">Diversión, alegría</div>
        </div>
        <div class="center-logo">
            <h1>WAZA<span class="dot">.</span></h1>
        </div>
    </div>
</body>
</html>
