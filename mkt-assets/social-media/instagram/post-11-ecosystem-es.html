<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Ecosistema de Productos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Dot grid */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0);
            background-size: 32px 32px;
        }

        /* Radial glow behind center */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,46,99,0.1) 0%, rgba(112,45,255,0.06) 35%, transparent 65%);
            border-radius: 50%;
        }

        /* Header */
        .header {
            position: absolute;
            top: 44px;
            left: 56px;
            right: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .brand {
            font-size: 18px;
            font-weight: 800;
            color: #F9F7F7;
            letter-spacing: -0.5px;
        }

        .brand .dot { color: #FF2E63; }

        .badge {
            font-size: 10px;
            font-weight: 600;
            color: #08D9D6;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        /* Title */
        .title-area {
            position: absolute;
            top: 95px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
        }

        .title-area h1 {
            font-size: 46px;
            font-weight: 900;
            color: #F9F7F7;
            line-height: 1.1;
            letter-spacing: -2px;
        }

        .title-area .num {
            background: linear-gradient(135deg, #FF2E63, #702DFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-area .sub {
            font-size: 16px;
            font-weight: 400;
            color: rgba(249,247,247,0.45);
            margin-top: 10px;
        }

        /* ============ HUB AND SPOKE ============ */
        .hub-container {
            position: absolute;
            width: 900px;
            height: 740px;
            top: 210px;
            left: 50%;
            transform: translateX(-50%);
        }

        .hub-container svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Center hub */
        .hub {
            position: absolute;
            left: 450px;
            top: 340px;
            transform: translate(-50%, -50%);
            z-index: 15;
        }

        .hub-inner {
            background: linear-gradient(135deg, #FF2E63 0%, #702DFF 100%);
            border-radius: 50%;
            width: 130px;
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 50px rgba(255,46,99,0.4),
                0 0 100px rgba(112,45,255,0.15),
                inset 0 0 30px rgba(255,255,255,0.1);
        }

        .hub-name {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .hub-sub {
            font-size: 8px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Spoke nodes */
        .spoke {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .spoke-inner {
            background: rgba(37,42,52,0.9);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(8,217,214,0.3);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #F9F7F7;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .spoke-inner::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #08D9D6;
            margin-right: 8px;
            vertical-align: middle;
            box-shadow: 0 0 6px rgba(8,217,214,0.6);
        }

        /* Alternate dot colors */
        .spoke:nth-child(3n) .spoke-inner::before { background: #FF2E63; box-shadow: 0 0 6px rgba(255,46,99,0.6); }
        .spoke:nth-child(3n+1) .spoke-inner::before { background: #702DFF; box-shadow: 0 0 6px rgba(112,45,255,0.6); }

        /* Positions: 14 spokes around center (450, 340) */
        /* Evenly distributed in ellipse: wider horizontal, slightly taller */
        .s1  { left: 450px; top: 50px; }    /* top center */
        .s2  { left: 640px; top: 75px; }    /* top right */
        .s3  { left: 780px; top: 170px; }   /* right upper */
        .s4  { left: 840px; top: 305px; }   /* right */
        .s5  { left: 800px; top: 440px; }   /* right lower */
        .s6  { left: 680px; top: 545px; }   /* bottom right */
        .s7  { left: 510px; top: 600px; }   /* bottom center-right */
        .s8  { left: 340px; top: 600px; }   /* bottom center-left */
        .s9  { left: 210px; top: 545px; }   /* bottom left */
        .s10 { left: 95px;  top: 440px; }   /* left lower */
        .s11 { left: 60px;  top: 305px; }   /* left */
        .s12 { left: 105px; top: 170px; }   /* left upper */
        .s13 { left: 250px; top: 75px; }    /* top left */
        .s14 { left: 450px; top: 640px; }   /* very bottom */

        /* SVG line styles */
        .spoke-line {
            stroke-width: 1.5;
            fill: none;
            opacity: 0.5;
        }

        /* Watermark */
        .watermark {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 18px;
            font-weight: 700;
            color: rgba(249,247,247,0.35);
            letter-spacing: -0.5px;
        }

        .watermark .wd { color: rgba(255,46,99,0.45); }

    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="header">
        <div class="brand">WAZA<span class="dot">.</span></div>
        <div class="badge">Ecosistema de Productos</div>
    </div>

    <div class="title-area">
        <h1><span class="num">15+</span> Herramientas de IA. Un Hub.</h1>
        <p class="sub">Todos los caminos llevan a RobotMind.</p>
    </div>

    <div class="hub-container">
        <!-- SVG spokes from center (450,340) to each node -->
        <svg viewBox="0 0 900 740" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#FF2E63" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#08D9D6" stop-opacity="0.15"/>
                </linearGradient>
                <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#702DFF" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#08D9D6" stop-opacity="0.15"/>
                </linearGradient>
                <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#08D9D6" stop-opacity="0.5"/>
                    <stop offset="100%" stop-color="#08D9D6" stop-opacity="0.1"/>
                </linearGradient>
                <filter id="lineGlow">
                    <feGaussianBlur stdDeviation="1.5" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- Spoke lines: center (450,340) → each node position -->
            <line class="spoke-line" filter="url(#lineGlow)" stroke="#FF2E63" stroke-opacity="0.5" x1="450" y1="340" x2="450" y2="50" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g2)" x1="450" y1="340" x2="640" y2="75" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g3)" x1="450" y1="340" x2="780" y2="170" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g1)" x1="450" y1="340" x2="840" y2="305" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g2)" x1="450" y1="340" x2="800" y2="440" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g3)" x1="450" y1="340" x2="680" y2="545" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g1)" x1="450" y1="340" x2="510" y2="600" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g2)" x1="450" y1="340" x2="340" y2="600" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g3)" x1="450" y1="340" x2="210" y2="545" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g1)" x1="450" y1="340" x2="95"  y2="440" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g2)" x1="450" y1="340" x2="60"  y2="305" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g3)" x1="450" y1="340" x2="105" y2="170" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="url(#g1)" x1="450" y1="340" x2="250" y2="75" />
            <line class="spoke-line" filter="url(#lineGlow)" stroke="#702DFF" stroke-opacity="0.5" x1="450" y1="340" x2="450" y2="640" />

            <!-- Small glow dots at spoke endpoints -->
            <circle cx="450" cy="50"  r="3" fill="#08D9D6" opacity="0.5"/>
            <circle cx="640" cy="75"  r="3" fill="#702DFF" opacity="0.5"/>
            <circle cx="780" cy="170" r="3" fill="#08D9D6" opacity="0.5"/>
            <circle cx="840" cy="305" r="3" fill="#FF2E63" opacity="0.5"/>
            <circle cx="800" cy="440" r="3" fill="#702DFF" opacity="0.5"/>
            <circle cx="680" cy="545" r="3" fill="#08D9D6" opacity="0.5"/>
            <circle cx="510" cy="600" r="3" fill="#FF2E63" opacity="0.5"/>
            <circle cx="340" cy="600" r="3" fill="#702DFF" opacity="0.5"/>
            <circle cx="210" cy="545" r="3" fill="#08D9D6" opacity="0.5"/>
            <circle cx="95"  cy="440" r="3" fill="#FF2E63" opacity="0.5"/>
            <circle cx="60"  cy="305" r="3" fill="#702DFF" opacity="0.5"/>
            <circle cx="105" cy="170" r="3" fill="#08D9D6" opacity="0.5"/>
            <circle cx="250" cy="75"  r="3" fill="#FF2E63" opacity="0.5"/>
            <circle cx="450" cy="640" r="3" fill="#702DFF" opacity="0.5"/>
        </svg>

        <!-- Center Hub -->
        <div class="hub">
            <div class="hub-inner">
                <span class="hub-name">RobotMind</span>
                <span class="hub-sub">Hub Central</span>
            </div>
        </div>

        <!-- Spoke Nodes -->
        <div class="spoke s1"><div class="spoke-inner">AdScout</div></div>
        <div class="spoke s2"><div class="spoke-inner">BriefBoy</div></div>
        <div class="spoke s3"><div class="spoke-inner">MarketScope</div></div>
        <div class="spoke s4"><div class="spoke-inner">Memecoin Scout</div></div>
        <div class="spoke s5"><div class="spoke-inner">GlamLocal</div></div>
        <div class="spoke s6"><div class="spoke-inner">TidyHome</div></div>
        <div class="spoke s7"><div class="spoke-inner">Sobrecitos</div></div>
        <div class="spoke s8"><div class="spoke-inner">BotCitas</div></div>
        <div class="spoke s9"><div class="spoke-inner">Carl Sagan's</div></div>
        <div class="spoke s10"><div class="spoke-inner">Good Deal Calc</div></div>
        <div class="spoke s11"><div class="spoke-inner">BuyerPersonaX</div></div>
        <div class="spoke s12"><div class="spoke-inner">VibeCodingPRD</div></div>
        <div class="spoke s13"><div class="spoke-inner">TacosNearMe</div></div>
        <div class="spoke s14"><div class="spoke-inner">Waza Stonks</div></div>
    </div>

    <div class="watermark">waza<span class="wd">.</span>baby</div>

</body>
</html>
