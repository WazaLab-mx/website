<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Nacido Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            position: relative;
        }

        .title {
            font-size: 80px;
            font-weight: 900;
            color: #F9F7F7;
            margin-bottom: 80px;
            text-align: center;
            letter-spacing: -2px;
        }

        .globe {
            position: relative;
            width: 500px;
            height: 500px;
            margin-bottom: 60px;
        }

        .globe-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(8, 217, 214, 0.2);
            border-radius: 50%;
        }

        .globe-circle.orbit-1 {
            animation: rotate 30s linear infinite;
        }

        .globe-circle.orbit-2 {
            animation: rotate-reverse 25s linear infinite;
            border-color: rgba(112, 45, 255, 0.2);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-reverse {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .dots-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .dot {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .dot-1 { top: 10%; left: 50%; background: rgba(255, 46, 99, 0.3); animation-delay: 0s; }
        .dot-2 { top: 30%; right: 15%; background: rgba(8, 217, 214, 0.3); animation-delay: 0.4s; }
        .dot-3 { bottom: 30%; right: 20%; background: rgba(112, 45, 255, 0.3); animation-delay: 0.8s; }
        .dot-4 { bottom: 20%; left: 25%; background: rgba(255, 46, 99, 0.3); animation-delay: 1.2s; }
        .dot-5 { top: 35%; left: 18%; background: rgba(8, 217, 214, 0.3); animation-delay: 1.6s; }

        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg,
                rgba(8, 217, 214, 0.4) 0%,
                rgba(112, 45, 255, 0.4) 50%,
                rgba(255, 46, 99, 0.4) 100%);
            transform-origin: left center;
            opacity: 0.6;
        }

        .line-1 { top: 15%; left: 50%; width: 180px; transform: rotate(35deg); }
        .line-2 { top: 35%; left: 60%; width: 150px; transform: rotate(-20deg); }
        .line-3 { bottom: 35%; left: 55%; width: 130px; transform: rotate(50deg); }
        .line-4 { bottom: 25%; left: 35%; width: 140px; transform: rotate(-45deg); }

        .subtitle {
            font-size: 36px;
            font-weight: 700;
            color: #08D9D6;
            text-align: center;
            margin-bottom: 40px;
        }

        .languages {
            font-size: 32px;
            font-weight: 600;
            color: #F9F7F7;
            text-align: center;
            line-height: 1.6;
        }

        .languages .highlight {
            color: #FF2E63;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Nacido Global</h1>

        <div class="globe">
            <div class="globe-circle orbit-1"></div>
            <div class="globe-circle orbit-2"></div>

            <div class="connection-line line-1"></div>
            <div class="connection-line line-2"></div>
            <div class="connection-line line-3"></div>
            <div class="connection-line line-4"></div>

            <div class="dots-container">
                <div class="dot dot-1">🇯🇵</div>
                <div class="dot dot-2">🇬🇧</div>
                <div class="dot dot-3">🇰🇪</div>
                <div class="dot dot-4">🇪🇸</div>
                <div class="dot dot-5">🇩🇪</div>
            </div>
        </div>

        <p class="subtitle">Nuestras herramientas hablan tu idioma</p>

        <p class="languages">
            <span class="highlight">Inglés.</span> Español. Alemán.<br>
            Y creciendo.
        </p>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
