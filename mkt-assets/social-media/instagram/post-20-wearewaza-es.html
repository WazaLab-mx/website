<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Somos WAZA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            position: relative;
        }

        .manifesto {
            max-width: 900px;
            text-align: center;
        }

        .line {
            font-size: 40px;
            font-weight: 600;
            color: #F9F7F7;
            line-height: 1.5;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        .line:nth-child(1) { animation-delay: 0.2s; }
        .line:nth-child(2) { animation-delay: 0.6s; }
        .line:nth-child(3) { animation-delay: 1s; }
        .line:nth-child(4) { animation-delay: 1.4s; }
        .line:nth-child(5) { animation-delay: 1.8s; }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emphasis {
            color: #08D9D6;
            font-weight: 700;
        }

        .closing {
            font-size: 84px;
            font-weight: 900;
            color: #F9F7F7;
            margin: 60px 0 20px;
            letter-spacing: -2px;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 2.2s;
        }

        .closing .waza {
            background: linear-gradient(135deg, #FF2E63 0%, #702DFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .dot {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #FF2E63;
            border-radius: 50%;
            margin-left: 8px;
            vertical-align: middle;
            box-shadow: 0 0 30px rgba(255, 46, 99, 0.8);
        }

        .tagline {
            font-size: 32px;
            font-weight: 600;
            color: #999;
            font-style: italic;
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 2.6s;
        }

        .accent-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="accent-glow"></div>
    <div class="container">
        <div class="manifesto">
            <p class="line">
                Somos <span class="emphasis">artesanos</span> con sentido del humor.
            </p>
            <p class="line">
                Somos <span class="emphasis">ingenieros</span> que sueñan más allá de las limitaciones.
            </p>
            <p class="line">
                Somos <span class="emphasis">artistas</span> que construyen con lógica y código.
            </p>

            <h1 class="closing">
                Somos <span class="waza">WAZA</span><span class="dot"></span>
            </h1>

            <p class="tagline">
                Y estamos creando un mundo más cool.
            </p>
        </div>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
