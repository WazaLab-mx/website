<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Humano + IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .split-container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }

        .side {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .side-left {
            background: linear-gradient(135deg, #FF2E63 0%, rgba(255, 46, 99, 0.3) 100%);
        }

        .side-right {
            background: linear-gradient(225deg, #08D9D6 0%, rgba(8, 217, 214, 0.3) 100%);
        }

        .human-silhouette {
            width: 300px;
            height: 450px;
            background: rgba(13, 13, 13, 0.7);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .human-silhouette::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: rgba(13, 13, 13, 0.7);
            border-radius: 50%;
        }

        .circuit-pattern {
            width: 350px;
            height: 450px;
            position: relative;
        }

        .circuit-line {
            position: absolute;
            background: rgba(13, 13, 13, 0.6);
            border-radius: 2px;
        }

        .circuit-node {
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(13, 13, 13, 0.8);
            border: 3px solid rgba(13, 13, 13, 0.9);
            border-radius: 50%;
        }

        .line-1 { width: 200px; height: 4px; top: 50px; left: 20px; transform: rotate(20deg); }
        .line-2 { width: 150px; height: 4px; top: 150px; left: 80px; }
        .line-3 { width: 4px; height: 180px; top: 120px; left: 200px; }
        .line-4 { width: 220px; height: 4px; top: 280px; left: 40px; transform: rotate(-15deg); }
        .line-5 { width: 4px; height: 120px; top: 50px; left: 120px; }
        .line-6 { width: 160px; height: 4px; top: 380px; left: 100px; }

        .node-1 { top: 48px; left: 18px; }
        .node-2 { top: 148px; left: 228px; }
        .node-3 { top: 298px; left: 38px; }
        .node-4 { top: 378px; left: 258px; }
        .node-5 { top: 48px; left: 118px; }
        .node-6 { top: 168px; left: 118px; }

        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 600px;
        }

        .main-text {
            font-size: 72px;
            font-weight: 900;
            color: #F9F7F7;
            line-height: 1.2;
            margin-bottom: 40px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .main-text .plus {
            color: #702DFF;
            font-size: 64px;
        }

        .main-text .equals {
            color: #702DFF;
            font-size: 64px;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 600;
            color: #F9F7F7;
            line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .subtitle .highlight {
            color: #702DFF;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.9;
            z-index: 10;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="split-container">
            <div class="side side-left">
                <div class="human-silhouette"></div>
            </div>
            <div class="side side-right">
                <div class="circuit-pattern">
                    <div class="circuit-line line-1"></div>
                    <div class="circuit-line line-2"></div>
                    <div class="circuit-line line-3"></div>
                    <div class="circuit-line line-4"></div>
                    <div class="circuit-line line-5"></div>
                    <div class="circuit-line line-6"></div>
                    <div class="circuit-node node-1"></div>
                    <div class="circuit-node node-2"></div>
                    <div class="circuit-node node-3"></div>
                    <div class="circuit-node node-4"></div>
                    <div class="circuit-node node-5"></div>
                    <div class="circuit-node node-6"></div>
                </div>
            </div>
        </div>

        <div class="center-content">
            <div class="main-text">
                Humano <span class="plus">+</span> IA<br>
                <span class="equals">=</span> Imparable
            </div>
            <div class="subtitle">
                Amplificamos la <span class="highlight">creatividad</span>.<br>
                La IA maneja lo repetitivo.
            </div>
        </div>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
