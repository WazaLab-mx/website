<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>How We Work</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 120px;
        }

        .title {
            font-size: 72px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 100px;
            letter-spacing: -2px;
        }

        .timeline {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 50px;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 60px;
            top: 60px;
            bottom: 60px;
            width: 4px;
            background: linear-gradient(180deg, #FF2E63, #08D9D6, #702DFF, #FF2E63);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 40px;
            position: relative;
        }

        .number-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 900;
            color: #0D0D0D;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .step:nth-child(1) .number-circle {
            background: #FF2E63;
            box-shadow: 0 0 40px rgba(255, 46, 99, 0.5);
        }

        .step:nth-child(2) .number-circle {
            background: #08D9D6;
            box-shadow: 0 0 40px rgba(8, 217, 214, 0.5);
        }

        .step:nth-child(3) .number-circle {
            background: #702DFF;
            box-shadow: 0 0 40px rgba(112, 45, 255, 0.5);
        }

        .step:nth-child(4) .number-circle {
            background: linear-gradient(135deg, #FF2E63, #702DFF);
            box-shadow: 0 0 40px rgba(255, 46, 99, 0.5);
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-size: 48px;
            font-weight: 800;
            color: #F9F7F7;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .step-description {
            font-size: 28px;
            font-weight: 400;
            color: #F9F7F7;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">How We Work</h1>

        <div class="timeline">
            <div class="step">
                <div class="number-circle">1</div>
                <div class="step-content">
                    <h2 class="step-title">Discovery</h2>
                    <p class="step-description">Understand your problem</p>
                </div>
            </div>

            <div class="step">
                <div class="number-circle">2</div>
                <div class="step-content">
                    <h2 class="step-title">Build</h2>
                    <p class="step-description">AI-native solution</p>
                </div>
            </div>

            <div class="step">
                <div class="number-circle">3</div>
                <div class="step-content">
                    <h2 class="step-title">Deploy</h2>
                    <p class="step-description">Fast & secure</p>
                </div>
            </div>

            <div class="step">
                <div class="number-circle">4</div>
                <div class="step-content">
                    <h2 class="step-title">Evolve</h2>
                    <p class="step-description">Grows with you</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
