<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Founder Vision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(165deg, #0D0D0D 0%, #252A34 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px;
            position: relative;
        }

        .accent-line {
            width: 120px;
            height: 6px;
            background: #FF2E63;
            margin-bottom: 80px;
            border-radius: 3px;
        }

        .quote-mark {
            font-size: 180px;
            font-weight: 800;
            color: rgba(255, 46, 99, 0.15);
            line-height: 0.8;
            position: absolute;
            top: 80px;
            left: 100px;
        }

        .quote {
            font-size: 58px;
            font-weight: 700;
            color: #F9F7F7;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 60px;
            position: relative;
            z-index: 2;
            max-width: 840px;
        }

        .quote .highlight {
            color: #FF2E63;
        }

        .attribution {
            font-size: 32px;
            font-weight: 600;
            color: #08D9D6;
            text-align: center;
            letter-spacing: 2px;
        }

        .decoration {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 45, 255, 0.1) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quote-mark">"</div>
        <div class="accent-line"></div>
        <p class="quote">
            We don't build technology to <span class="highlight">impress</span>.<br>
            We build it to make your<br>
            day-to-day <span class="highlight">work</span>.
        </p>
        <p class="attribution">— WAZA</p>
        <div class="decoration"></div>
    </div>
</body>
</html>
