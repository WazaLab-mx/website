<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            position: relative;
        }

        .title {
            font-size: 64px;
            font-weight: 800;
            color: #F9F7F7;
            margin-bottom: 80px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 850px;
        }

        .service-card {
            background: #252A34;
            border-radius: 16px;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
        }

        .service-card-1::before {
            background: #FF2E63;
        }

        .service-card-2::before {
            background: #08D9D6;
        }

        .service-card-3::before {
            background: #702DFF;
        }

        .service-card-4::before {
            background: #F9F7F7;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 24px;
        }

        .service-title {
            font-size: 28px;
            font-weight: 700;
            color: #F9F7F7;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .service-description {
            font-size: 18px;
            font-weight: 400;
            color: #999;
            line-height: 1.5;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.8;
        }

        .background-pattern {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.05) 0%, transparent 70%);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    <div class="container">
        <h1 class="title">How We Help You</h1>

        <div class="grid">
            <div class="service-card service-card-1">
                <div class="icon">🚀</div>
                <h3 class="service-title">Ready-to-Use<br>Products</h3>
                <p class="service-description">Deploy powerful AI tools instantly</p>
            </div>

            <div class="service-card service-card-2">
                <div class="icon">⚡</div>
                <h3 class="service-title">Custom<br>Development</h3>
                <p class="service-description">Tailored solutions for your needs</p>
            </div>

            <div class="service-card service-card-3">
                <div class="icon">💡</div>
                <h3 class="service-title">Consulting</h3>
                <p class="service-description">Strategic guidance for AI adoption</p>
            </div>

            <div class="service-card service-card-4">
                <div class="icon">📚</div>
                <h3 class="service-title">Training &<br>Workshops</h3>
                <p class="service-description">Empower your team with AI skills</p>
            </div>
        </div>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
