<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>RobotMind Feature - Vertical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1350px;
            background: radial-gradient(circle at top right, #1a1a2e 0%, #0D0D0D 50%);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 80px;
            position: relative;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 70px;
            left: 80px;
            font-size: 32px;
            font-weight: 800;
            color: #F9F7F7;
            letter-spacing: 0.5px;
        }

        .header .dot {
            color: #FF2E63;
        }

        .main-title {
            font-size: 66px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 38px;
            font-weight: 300;
            color: #702DFF;
            text-align: center;
            margin-bottom: 80px;
            letter-spacing: -0.3px;
        }

        .features {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 26px;
            margin-bottom: 70px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 26px;
            padding: 32px 34px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }

        .feature-icon {
            font-size: 38px;
            flex-shrink: 0;
            width: 60px;
            text-align: center;
        }

        .feature-text {
            font-size: 27px;
            font-weight: 500;
            color: #F9F7F7;
            line-height: 1.4;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin-top: 30px;
        }

        .powered-by {
            font-size: 20px;
            font-weight: 400;
            color: rgba(249, 247, 247, 0.5);
        }

        .badge {
            padding: 16px 36px;
            background: linear-gradient(135deg, #702DFF 0%, #9D4EDD 100%);
            border-radius: 8px;
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            letter-spacing: 0.5px;
        }

        .accent-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 45, 255, 0.2) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="accent-glow"></div>
    <div class="header">WAZA<span class="dot">.</span></div>

    <div class="content-wrapper">
        <h1 class="main-title">Your AI Agent.<br>Our Infrastructure.</h1>
        <p class="subtitle">Introducing RobotMind</p>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">🔗</div>
                <div class="feature-text">Connects to 20+ tools (Google, WhatsApp, GitHub, Notion...)</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Setup in under 10 minutes</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🧠</div>
                <div class="feature-text">Powered by Claude Opus & Sonnet</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">Fully managed & secure</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🌙</div>
                <div class="feature-text">Works while you sleep</div>
            </div>
        </div>

        <div class="badge-container">
            <span class="powered-by">Built on</span>
            <div class="badge">OpenClaw</div>
        </div>
    </div>
</body>
</html>
