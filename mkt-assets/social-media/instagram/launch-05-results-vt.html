<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Results & Social Proof - Vertical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(135deg, #0D0D0D 0%, #252A34 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 80px;
            position: relative;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 70px;
            left: 80px;
            font-size: 32px;
            font-weight: 800;
            color: #F9F7F7;
            letter-spacing: 0.5px;
        }

        .header .dot {
            color: #FF2E63;
        }

        .main-title {
            font-size: 76px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 90px;
            letter-spacing: -1px;
        }

        .stats {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 80px;
        }

        .stat-card {
            padding: 45px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .stat-number {
            font-size: 72px;
            font-weight: 900;
            margin-bottom: 15px;
            line-height: 1;
        }

        .stat-card:nth-child(1) .stat-number {
            color: #FF2E63;
        }

        .stat-card:nth-child(2) .stat-number {
            color: #08D9D6;
        }

        .stat-card:nth-child(3) .stat-number {
            color: #702DFF;
        }

        .stat-card:nth-child(4) .stat-number {
            color: #F9F7F7;
        }

        .stat-label {
            font-size: 24px;
            font-weight: 500;
            color: rgba(249, 247, 247, 0.8);
            line-height: 1.4;
        }

        .trusted-section {
            width: 100%;
            text-align: center;
        }

        .trusted-title {
            font-size: 26px;
            font-weight: 600;
            color: rgba(249, 247, 247, 0.5);
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .clients {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .client {
            font-size: 30px;
            font-weight: 700;
            color: #F9F7F7;
            padding: 28px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 50px,
                rgba(255, 255, 255, 0.1) 50px,
                rgba(255, 255, 255, 0.1) 51px
            );
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="header">WAZA<span class="dot">.</span></div>

    <div class="content-wrapper">
        <h1 class="main-title">Results That Speak</h1>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">45%</div>
                <div class="stat-label">More engagement</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">3x</div>
                <div class="stat-label">Productivity boost</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">60%</div>
                <div class="stat-label">Faster development</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">30%</div>
                <div class="stat-label">Fewer support tickets</div>
            </div>
        </div>

        <div class="trusted-section">
            <div class="trusted-title">Trusted By</div>
            <div class="clients">
                <div class="client">Warner Music Group</div>
                <div class="client">Leo Burnett Mx</div>
                <div class="client">Matraka</div>
                <div class="client">Bisonte</div>
            </div>
        </div>
    </div>
</body>
</html>
