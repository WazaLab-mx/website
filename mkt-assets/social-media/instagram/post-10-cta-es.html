<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Únete a WAZA Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                #0D0D0D 0%,
                #FF2E63 25%,
                #08D9D6 50%,
                #702DFF 75%,
                #0D0D0D 100%
            );
            background-size: 400% 400%;
            animation: gradient 8s ease infinite;
            opacity: 0.15;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            position: relative;
            z-index: 1;
        }

        .tagline {
            font-size: 56px;
            font-weight: 700;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.3;
        }

        .tagline .highlight {
            color: #08D9D6;
            text-shadow: 0 0 30px rgba(8, 217, 214, 0.5);
        }

        .cta-main {
            background: linear-gradient(135deg, #FF2E63, #702DFF);
            border-radius: 24px;
            padding: 50px 90px;
            margin-bottom: 40px;
            box-shadow:
                0 10px 60px rgba(255, 46, 99, 0.4),
                0 0 0 4px rgba(255, 46, 99, 0.2);
        }

        .cta-text {
            font-size: 68px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            line-height: 1.2;
            letter-spacing: -2px;
        }

        .urgency {
            background: rgba(8, 217, 214, 0.2);
            border: 2px solid #08D9D6;
            border-radius: 100px;
            padding: 20px 50px;
            margin-bottom: 50px;
        }

        .urgency-text {
            font-size: 32px;
            font-weight: 700;
            color: #08D9D6;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .url {
            font-size: 52px;
            font-weight: 800;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 20px;
        }

        .url .dot {
            color: #FF2E63;
            text-shadow: 0 0 20px rgba(255, 46, 99, 0.6);
        }

        .subtext {
            font-size: 28px;
            font-weight: 400;
            color: #F9F7F7;
            opacity: 0.6;
            text-align: center;
        }

        .glow-circle {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.2), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="glow-circle"></div>

    <div class="container">
        <p class="tagline">
            El futuro de la IA es <span class="highlight">práctico</span>.
        </p>

        <div class="cta-main">
            <h1 class="cta-text">Explora waza.baby Lab</h1>
        </div>

        <div class="urgency">
            <p class="urgency-text">IA Que Ya Funciona</p>
        </div>

        <p class="url">waza<span class="dot">.</span>baby</p>
        <p class="subtext">Empieza a construir el futuro hoy</p>
    </div>
</body>
</html>
