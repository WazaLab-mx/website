<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Vibe Coding: The New Paradigm - WAZA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            color: #F9F7F7;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 48px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #F9F7F7;
            position: relative;
        }

        .logo::before {
            content: '';
            width: 12px;
            height: 12px;
            background: #FF2E63;
            border-radius: 50%;
            position: absolute;
            top: -6px;
            right: -6px;
        }

        .badge {
            background: rgba(255, 46, 99, 0.15);
            border: 1.5px solid #FF2E63;
            color: #FF2E63;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .content {
            flex: 1;
            padding: 0 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 60px;
        }

        .title {
            font-size: 64px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2px;
            color: #F9F7F7;
            margin-bottom: 20px;
        }

        .quote {
            font-size: 42px;
            font-weight: 600;
            line-height: 1.3;
            color: #08D9D6;
            font-style: italic;
            margin-bottom: 40px;
            position: relative;
            padding-left: 30px;
        }

        .quote::before {
            content: '"';
            position: absolute;
            left: 0;
            top: -10px;
            font-size: 80px;
            color: #FF2E63;
            opacity: 0.3;
            font-family: Georgia, serif;
        }

        .principles {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .principle {
            background: rgba(37, 42, 52, 0.6);
            border-left: 5px solid #702DFF;
            padding: 32px 40px;
            border-radius: 8px;
        }

        .principle:nth-child(2) {
            border-left-color: #08D9D6;
        }

        .principle:nth-child(3) {
            border-left-color: #FF2E63;
        }

        .principle-title {
            font-size: 28px;
            font-weight: 800;
            color: #F9F7F7;
            margin-bottom: 8px;
        }

        .principle-desc {
            font-size: 20px;
            font-weight: 400;
            color: rgba(249, 247, 247, 0.7);
            line-height: 1.4;
        }

        .bottom-text {
            font-size: 18px;
            font-weight: 600;
            color: #08D9D6;
            text-align: center;
            margin-top: 20px;
        }

        .footer {
            padding: 48px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .watermark {
            font-size: 24px;
            font-weight: 700;
            color: rgba(249, 247, 247, 0.4);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">WAZA.</div>
        <div class="badge">EDUCATION</div>
    </div>

    <div class="content">
        <div>
            <div class="title">Vibe Coding:<br>The New Paradigm</div>
            <div class="quote">Tell the AI what you want.<br>Watch it build.</div>
        </div>

        <div class="principles">
            <div class="principle">
                <div class="principle-title">Intent over Syntax</div>
                <div class="principle-desc">You focus on WHAT, AI handles HOW</div>
            </div>
            <div class="principle">
                <div class="principle-title">Conversation as Code</div>
                <div class="principle-desc">Natural language becomes software</div>
            </div>
            <div class="principle">
                <div class="principle-title">Human in the Loop</div>
                <div class="principle-desc">AI proposes, humans decide</div>
            </div>
        </div>

        <div class="bottom-text">This is how we build 15+ products at WAZA.</div>
    </div>

    <div class="footer">
        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
