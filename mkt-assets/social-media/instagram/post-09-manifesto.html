<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>WAZA Manifesto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #0D0D0D 0%, #252A34 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .texture {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(255, 46, 99, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(8, 217, 214, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(112, 45, 255, 0.05) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 100px;
            position: relative;
            z-index: 1;
        }

        .quote-mark {
            font-size: 180px;
            font-weight: 900;
            color: #FF2E63;
            opacity: 0.2;
            line-height: 1;
            position: absolute;
            top: 80px;
            left: 80px;
        }

        .quote {
            font-size: 48px;
            font-weight: 700;
            color: #F9F7F7;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 60px;
            position: relative;
            z-index: 2;
        }

        .highlight {
            color: #08D9D6;
            text-shadow: 0 0 20px rgba(8, 217, 214, 0.3);
        }

        .attribution {
            font-size: 32px;
            font-weight: 600;
            color: #F9F7F7;
            opacity: 0.6;
            text-align: center;
            font-style: italic;
        }

        .accent-line {
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #FF2E63, transparent);
            margin: 50px auto;
        }
    </style>
</head>
<body>
    <div class="texture"></div>

    <div class="container">
        <div class="quote-mark">"</div>

        <p class="quote">
            We are <span class="highlight">craftspeople</span> with a sense of humor.
            <span class="highlight">Engineers</span> who dream beyond constraints.
            <span class="highlight">Artists</span> who build with logic and code.
        </p>

        <div class="accent-line"></div>

        <p class="attribution">— The WAZA Manifesto</p>
    </div>
</body>
</html>
