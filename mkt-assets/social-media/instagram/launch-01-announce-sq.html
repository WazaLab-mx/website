<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>WAZA Launch Announcement - Square</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 60px;
            left: 80px;
            font-size: 28px;
            font-weight: 800;
            color: #F9F7F7;
            letter-spacing: 0.5px;
        }

        .header .dot {
            color: #FF2E63;
        }

        .main-title {
            font-size: 72px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 300;
            color: #08D9D6;
            text-align: center;
            margin-bottom: 80px;
            letter-spacing: -0.5px;
        }

        .features {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 80px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 25px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #FF2E63;
            backdrop-filter: blur(10px);
        }

        .feature-item:nth-child(2) {
            border-left-color: #08D9D6;
        }

        .feature-item:nth-child(3) {
            border-left-color: #702DFF;
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            flex-shrink: 0;
        }

        .feature-text {
            font-size: 28px;
            font-weight: 600;
            color: #F9F7F7;
            letter-spacing: -0.3px;
        }

        .url {
            font-size: 36px;
            font-weight: 700;
            color: #FF2E63;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .bg-accent {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="bg-accent"></div>
    <div class="header">WAZA<span class="dot">.</span></div>

    <div class="content-wrapper">
        <h1 class="main-title">Introducing<br>waza.baby Lab</h1>
        <p class="subtitle">AI-Native Engineering for the Next Era</p>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">15+ AI Tools Ready to Deploy</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🏆</div>
                <div class="feature-text">Trusted by Industry Leaders</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Practical AI That Works</div>
            </div>
        </div>

        <div class="url">waza.baby</div>
    </div>
</body>
</html>
