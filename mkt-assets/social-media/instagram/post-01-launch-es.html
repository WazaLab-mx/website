<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>WAZA Lab Lanzamiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            position: relative;
        }

        .accent-line {
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, #FF2E63 0%, rgba(255, 46, 99, 0) 100%);
        }

        .main-title {
            font-size: 120px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            line-height: 1;
            margin-bottom: 30px;
            letter-spacing: -3px;
            text-shadow:
                0 0 40px rgba(255, 46, 99, 0.3),
                0 0 80px rgba(255, 46, 99, 0.2);
        }

        .main-title .lab {
            color: #FF2E63;
            text-shadow:
                0 0 40px rgba(255, 46, 99, 0.6),
                0 0 80px rgba(255, 46, 99, 0.4),
                0 0 120px rgba(255, 46, 99, 0.2);
        }

        .subtitle {
            font-size: 96px;
            font-weight: 300;
            color: #F9F7F7;
            margin-bottom: 80px;
            letter-spacing: -2px;
        }

        .description {
            font-size: 32px;
            font-weight: 400;
            color: #08D9D6;
            text-align: center;
            line-height: 1.5;
            max-width: 800px;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 28px;
            font-weight: 600;
            color: #F9F7F7;
            letter-spacing: 1px;
        }

        .dot {
            color: #FF2E63;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent-line"></div>
        <h1 class="main-title">waza.baby <span class="lab">Lab</span></h1>
        <p class="subtitle">está aquí.</p>
        <p class="description">Ingeniería nativa de IA.<br>Herramientas prácticas. Resultados reales.</p>
        <div class="watermark">waza<span class="dot">.</span>baby</div>
    </div>
</body>
</html>
