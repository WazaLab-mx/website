<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Features Highlight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        .title {
            font-size: 64px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -1px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 30px;
            flex: 1;
        }

        .feature-card {
            background: linear-gradient(135deg, rgba(37, 42, 52, 0.8), rgba(37, 42, 52, 0.4));
            border-radius: 24px;
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, var(--color), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .feature-card:nth-child(1) { --color: #FF2E63; }
        .feature-card:nth-child(2) { --color: #08D9D6; }
        .feature-card:nth-child(3) { --color: #702DFF; }
        .feature-card:nth-child(4) { --color: #FF2E63; }
        .feature-card:nth-child(5) { --color: #08D9D6; }
        .feature-card:nth-child(6) { --color: #702DFF; }

        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .feature-card:nth-child(1) .icon { color: #FF2E63; }
        .feature-card:nth-child(2) .icon { color: #08D9D6; }
        .feature-card:nth-child(3) .icon { color: #702DFF; }
        .feature-card:nth-child(4) .icon { color: #FF2E63; }
        .feature-card:nth-child(5) .icon { color: #08D9D6; }
        .feature-card:nth-child(6) .icon { color: #702DFF; }

        .feature-text {
            font-size: 26px;
            font-weight: 700;
            color: #F9F7F7;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">What Sets Us Apart</h1>
        </div>

        <div class="features-grid">
            <div class="feature-card">
                <div class="icon">🔄</div>
                <div class="feature-text">Continuous<br>Improvement</div>
            </div>

            <div class="feature-card">
                <div class="icon">🤖</div>
                <div class="feature-text">AI-First<br>Everything</div>
            </div>

            <div class="feature-card">
                <div class="icon">🎨</div>
                <div class="feature-text">Technical-Creative<br>Fusion</div>
            </div>

            <div class="feature-card">
                <div class="icon">🌐</div>
                <div class="feature-text">Ecosystem<br>Thinking</div>
            </div>

            <div class="feature-card">
                <div class="icon">👤</div>
                <div class="feature-text">Adaptive<br>Personalization</div>
            </div>

            <div class="feature-card">
                <div class="icon">🛡️</div>
                <div class="feature-text">Future-Proof<br>Design</div>
            </div>
        </div>
    </div>
</body>
</html>
