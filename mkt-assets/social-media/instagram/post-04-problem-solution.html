<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Problem Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
        }

        .split {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 60px;
        }

        .problem {
            background: #0D0D0D;
        }

        .solution {
            background: #252A34;
        }

        .title {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 60px;
            letter-spacing: -1px;
        }

        .problem .title {
            color: #FF2E63;
        }

        .solution .title {
            color: #08D9D6;
        }

        .items {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .icon {
            font-size: 36px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .problem .icon {
            color: #FF2E63;
        }

        .solution .icon {
            color: #08D9D6;
        }

        .item-text {
            font-size: 32px;
            font-weight: 600;
            color: #F9F7F7;
            line-height: 1.3;
        }

        .problem .item-text {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .brand-mark {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 700;
            color: #F9F7F7;
            background: #0D0D0D;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .brand-mark .dot {
            color: #FF2E63;
        }
    </style>
</head>
<body>
    <div class="split problem">
        <h2 class="title">The Problem</h2>
        <div class="items">
            <div class="item">
                <span class="icon">✕</span>
                <p class="item-text">Generic AI tools</p>
            </div>
            <div class="item">
                <span class="icon">✕</span>
                <p class="item-text">Endless learning curves</p>
            </div>
            <div class="item">
                <span class="icon">✕</span>
                <p class="item-text">Solutions that don't deliver</p>
            </div>
        </div>
    </div>

    <div class="split solution">
        <h2 class="title">Our Solution</h2>
        <div class="items">
            <div class="item">
                <span class="icon">✓</span>
                <p class="item-text">AI that already works</p>
            </div>
            <div class="item">
                <span class="icon">✓</span>
                <p class="item-text">Tailored to you</p>
            </div>
            <div class="item">
                <span class="icon">✓</span>
                <p class="item-text">We show you the way</p>
            </div>
        </div>
    </div>

    <div class="brand-mark">WAZA<span class="dot">.</span></div>
</body>
</html>
