<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Kaizen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            position: relative;
        }

        .enso {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 3px solid;
            border-color: #702DFF transparent #702DFF transparent;
            border-radius: 50%;
            opacity: 0.15;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .kanji {
            font-size: 240px;
            font-weight: 300;
            color: #702DFF;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1;
            opacity: 0.95;
            text-shadow: 0 0 60px rgba(112, 45, 255, 0.4);
        }

        .subtitle {
            font-size: 48px;
            font-weight: 700;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 80px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .philosophy {
            max-width: 800px;
            text-align: center;
            margin-bottom: 60px;
        }

        .philosophy-line {
            font-size: 32px;
            font-weight: 500;
            color: #F9F7F7;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .philosophy-line:last-child {
            margin-bottom: 0;
        }

        .philosophy-line .highlight {
            color: #08D9D6;
            font-weight: 700;
        }

        .accent-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #FF2E63;
            border-radius: 50%;
            margin: 0 12px;
            vertical-align: middle;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="enso"></div>

        <div class="kanji">改善</div>

        <h2 class="subtitle">Mejora Continua</h2>

        <div class="philosophy">
            <p class="philosophy-line">
                <span class="highlight">Cada día.</span> Cada proyecto. Cada interacción.
            </p>
            <p class="philosophy-line">
                <span class="accent-dot"></span>
            </p>
            <p class="philosophy-line">
                Pequeños cambios que se <span class="highlight">multiplican</span> con el tiempo.
            </p>
        </div>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
