<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Software is Eating the World - WAZA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: radial-gradient(circle at 30% 40%, rgba(112, 45, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 46, 99, 0.1) 0%, transparent 50%),
                        #0D0D0D;
            font-family: 'Inter', sans-serif;
            color: #F9F7F7;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 48px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #F9F7F7;
            position: relative;
        }

        .logo::before {
            content: '';
            width: 12px;
            height: 12px;
            background: #FF2E63;
            border-radius: 50%;
            position: absolute;
            top: -6px;
            right: -6px;
        }

        .badge {
            background: rgba(255, 46, 99, 0.15);
            border: 1.5px solid #FF2E63;
            color: #FF2E63;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .content {
            flex: 1;
            padding: 0 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .quote-mark {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 320px;
            font-family: Georgia, serif;
            color: #FF2E63;
            opacity: 0.08;
            line-height: 1;
            pointer-events: none;
        }

        .quote-text {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: -1.5px;
            color: #F9F7F7;
            max-width: 880px;
            position: relative;
            z-index: 2;
        }

        .quote-highlight {
            color: #08D9D6;
        }

        .quote-highlight-2 {
            color: #FF2E63;
        }

        .attribution {
            margin-top: 60px;
            font-size: 28px;
            font-weight: 700;
            color: rgba(249, 247, 247, 0.5);
            letter-spacing: 3px;
        }

        .decorative-line {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #702DFF 0%, #FF2E63 50%, #08D9D6 100%);
            margin: 40px auto;
            border-radius: 2px;
        }

        .footer {
            padding: 48px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .watermark {
            font-size: 24px;
            font-weight: 700;
            color: rgba(249, 247, 247, 0.4);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">WAZA.</div>
        <div class="badge">INSIGHT</div>
    </div>

    <div class="content">
        <div class="quote-mark">"</div>

        <div class="quote-text">
            El software se está comiendo al mundo. <span class="quote-highlight">La IA se está comiendo al software.</span> <span class="quote-highlight-2">Nosotros construimos el restaurante.</span>
        </div>

        <div class="decorative-line"></div>

        <div class="attribution">— WAZA</div>
    </div>

    <div class="footer">
        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
