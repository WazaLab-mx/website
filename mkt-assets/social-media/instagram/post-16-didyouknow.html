<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Did You Know</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            position: relative;
        }

        .card {
            background: #252A34;
            border-radius: 24px;
            padding: 80px;
            max-width: 800px;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid #08D9D6;
        }

        .header {
            font-size: 40px;
            font-weight: 800;
            color: #08D9D6;
            text-align: center;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .stat-number {
            font-size: 140px;
            font-weight: 900;
            color: #FF2E63;
            line-height: 1;
            text-shadow: 0 0 40px rgba(255, 46, 99, 0.5);
        }

        .stat-text {
            font-size: 36px;
            font-weight: 600;
            color: #F9F7F7;
            margin-top: 20px;
            line-height: 1.4;
        }

        .divider {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, transparent 0%, #702DFF 50%, transparent 100%);
            margin: 50px auto;
        }

        .conclusion {
            font-size: 32px;
            font-weight: 700;
            color: #F9F7F7;
            text-align: center;
            line-height: 1.5;
        }

        .conclusion .brand {
            color: #FF2E63;
        }

        .conclusion .highlight {
            color: #08D9D6;
        }

        .accent-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 3px solid #702DFF;
        }

        .accent-corner.top-left {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
            border-radius: 8px 0 0 0;
        }

        .accent-corner.bottom-right {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 8px 0;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent-corner top-left"></div>
        <div class="accent-corner bottom-right"></div>

        <div class="card">
            <h2 class="header">Did You Know?</h2>

            <div class="stat-container">
                <div class="stat-number">60%</div>
                <p class="stat-text">
                    of AI implementations fail because<br>
                    they're built as add-ons,<br>
                    not as foundations.
                </p>
            </div>

            <div class="divider"></div>

            <p class="conclusion">
                At <span class="brand">WAZA</span>, AI isn't an add-on.<br>
                It's the <span class="highlight">foundation</span>.
            </p>
        </div>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
