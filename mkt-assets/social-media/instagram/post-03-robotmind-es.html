<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>RobotMind Producto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-pattern {
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 49px, #08D9D6 49px, #08D9D6 50px),
                repeating-linear-gradient(90deg, transparent, transparent 49px, #08D9D6 49px, #08D9D6 50px);
            opacity: 0.03;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            position: relative;
            z-index: 1;
        }

        .headline {
            font-size: 68px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 60px;
            letter-spacing: -2px;
        }

        .headline .highlight {
            color: #08D9D6;
            text-shadow: 0 0 30px rgba(8, 217, 214, 0.4);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
            max-width: 900px;
        }

        .feature-pill {
            background: linear-gradient(135deg, rgba(8, 217, 214, 0.1), rgba(8, 217, 214, 0.05));
            border: 2px solid rgba(8, 217, 214, 0.3);
            border-radius: 50px;
            padding: 20px 30px;
            font-size: 24px;
            font-weight: 600;
            color: #08D9D6;
            text-align: center;
            box-shadow: 0 4px 20px rgba(8, 217, 214, 0.1);
        }

        .setup-badge {
            background: linear-gradient(135deg, #702DFF, #FF2E63);
            border-radius: 20px;
            padding: 25px 50px;
            margin-bottom: 50px;
            box-shadow: 0 8px 30px rgba(112, 45, 255, 0.3);
        }

        .setup-badge p {
            font-size: 32px;
            font-weight: 700;
            color: #F9F7F7;
            text-align: center;
        }

        .cta {
            background: #FF2E63;
            border-radius: 16px;
            padding: 30px 80px;
            font-size: 40px;
            font-weight: 800;
            color: #F9F7F7;
            text-align: center;
            box-shadow: 0 8px 40px rgba(255, 46, 99, 0.4);
            margin-bottom: 40px;
        }

        .powered {
            font-size: 20px;
            font-weight: 400;
            color: #F9F7F7;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <h1 class="headline">Tu <span class="highlight">Agente de IA</span>.<br>Nuestra Infraestructura.</h1>

        <div class="features">
            <div class="feature-pill">Google Workspace</div>
            <div class="feature-pill">WhatsApp</div>
            <div class="feature-pill">Telegram</div>
            <div class="feature-pill">GitHub</div>
            <div class="feature-pill">Notion</div>
            <div class="feature-pill">20+ herramientas</div>
        </div>

        <div class="setup-badge">
            <p>Configuración en menos de 10 minutos</p>
        </div>

        <div class="cta">Descubre RobotMind</div>

        <p class="powered">Impulsado por OpenClaw</p>
    </div>
</body>
</html>
