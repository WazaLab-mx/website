<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>WAZA - What We Build</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            color: #F9F7F7;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 60px 60px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #F9F7F7;
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: 0;
            left: -20px;
            width: 12px;
            height: 12px;
            background: #FF2E63;
            border-radius: 50%;
        }

        .badge {
            background: #252A34;
            color: #FF2E63;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .content {
            flex: 1;
            padding: 0 60px;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: #F9F7F7;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: #252A34;
            border-radius: 16px;
            padding: 32px;
            border-left: 5px solid;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card:nth-child(1) { border-color: #FF2E63; }
        .card:nth-child(2) { border-color: #08D9D6; }
        .card:nth-child(3) { border-color: #702DFF; }
        .card:nth-child(4) { border-color: #FF2E63; }
        .card:nth-child(5) { border-color: #08D9D6; }
        .card:nth-child(6) { border-color: #702DFF; }
        .card:nth-child(7) { border-color: #FF2E63; }
        .card:nth-child(8) { border-color: #08D9D6; }

        .card-icon {
            font-size: 36px;
            line-height: 1;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #F9F7F7;
            line-height: 1.3;
        }

        .tagline {
            font-size: 20px;
            font-weight: 500;
            line-height: 1.5;
            color: #F9F7F7;
            opacity: 0.8;
            text-align: center;
        }

        .footer {
            padding: 40px 60px 60px;
            text-align: center;
        }

        .watermark {
            font-size: 24px;
            font-weight: 600;
            color: #F9F7F7;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">WAZA.</div>
        <div class="badge">CAPABILITIES</div>
    </div>

    <div class="content">
        <div class="title">What Can We Build?</div>

        <div class="grid">
            <div class="card">
                <div class="card-icon">🤖</div>
                <div class="card-title">AI Agents & Chatbots</div>
            </div>

            <div class="card">
                <div class="card-icon">💻</div>
                <div class="card-title">SaaS Platforms</div>
            </div>

            <div class="card">
                <div class="card-icon">📱</div>
                <div class="card-title">Mobile Apps</div>
            </div>

            <div class="card">
                <div class="card-icon">📊</div>
                <div class="card-title">Marketing Tools</div>
            </div>

            <div class="card">
                <div class="card-icon">💰</div>
                <div class="card-title">FinTech Solutions</div>
            </div>

            <div class="card">
                <div class="card-icon">🛒</div>
                <div class="card-title">E-Commerce</div>
            </div>

            <div class="card">
                <div class="card-icon">⚡</div>
                <div class="card-title">Data Pipelines</div>
            </div>

            <div class="card">
                <div class="card-icon">🔗</div>
                <div class="card-title">API Integrations</div>
            </div>
        </div>

        <div class="tagline">
            If you can imagine it, we can build it.
        </div>
    </div>

    <div class="footer">
        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
