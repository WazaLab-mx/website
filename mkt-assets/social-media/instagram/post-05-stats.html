<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Stats Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        .title {
            font-size: 72px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -2px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 40px;
            flex: 1;
        }

        .stat-block {
            background: linear-gradient(135deg, #252A34, #1a1d26);
            border-radius: 30px;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .stat-block::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            padding: 2px;
            background: linear-gradient(135deg, var(--color), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }

        .stat-block:nth-child(1) { --color: #FF2E63; }
        .stat-block:nth-child(2) { --color: #08D9D6; }
        .stat-block:nth-child(3) { --color: #702DFF; }
        .stat-block:nth-child(4) { --color: #F9F7F7; }

        .number {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -3px;
        }

        .stat-block:nth-child(1) .number {
            color: #FF2E63;
            text-shadow: 0 0 40px rgba(255, 46, 99, 0.4);
        }

        .stat-block:nth-child(2) .number {
            color: #08D9D6;
            text-shadow: 0 0 40px rgba(8, 217, 214, 0.4);
        }

        .stat-block:nth-child(3) .number {
            color: #702DFF;
            text-shadow: 0 0 40px rgba(112, 45, 255, 0.4);
        }

        .stat-block:nth-child(4) .number {
            color: #F9F7F7;
            text-shadow: 0 0 40px rgba(249, 247, 247, 0.3);
        }

        .label {
            font-size: 28px;
            font-weight: 600;
            color: #F9F7F7;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Results That Matter</h1>
        </div>

        <div class="grid">
            <div class="stat-block">
                <div class="number">45%</div>
                <div class="label">More engagement</div>
            </div>

            <div class="stat-block">
                <div class="number">3x</div>
                <div class="label">Productivity boost</div>
            </div>

            <div class="stat-block">
                <div class="number">60%</div>
                <div class="label">Faster development</div>
            </div>

            <div class="stat-block">
                <div class="number">30%</div>
                <div class="label">Less support tickets</div>
            </div>
        </div>
    </div>
</body>
</html>
