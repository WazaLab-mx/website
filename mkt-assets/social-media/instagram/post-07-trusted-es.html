<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>Confían en Nosotros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(8, 217, 214, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(8, 217, 214, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 64px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 100px;
            letter-spacing: -1px;
        }

        .logos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 800px;
            width: 100%;
        }

        .logo-card {
            background: rgba(37, 42, 52, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(8, 217, 214, 0.2);
            border-radius: 24px;
            padding: 60px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(8, 217, 214, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .logo-card:hover::before {
            opacity: 1;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 700;
            color: #F9F7F7;
            text-align: center;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }

        .logo-card:nth-child(1) .logo-text {
            color: #FF2E63;
        }

        .logo-card:nth-child(2) .logo-text {
            color: #08D9D6;
        }

        .logo-card:nth-child(3) .logo-text {
            color: #702DFF;
        }

        .logo-card:nth-child(4) .logo-text {
            color: #F9F7F7;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 28px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <h1 class="title">Confían en Nosotros</h1>

        <div class="logos-grid">
            <div class="logo-card">
                <div class="logo-text">Warner Music<br>Group</div>
            </div>

            <div class="logo-card">
                <div class="logo-text">Leo Burnett<br>Mx</div>
            </div>

            <div class="logo-card">
                <div class="logo-text">Matraka</div>
            </div>

            <div class="logo-card">
                <div class="logo-text">Bisonte</div>
            </div>
        </div>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
