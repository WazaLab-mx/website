<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - Stack Tecnológico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            position: relative;
        }

        .title {
            font-size: 72px;
            font-weight: 800;
            color: #F9F7F7;
            margin-bottom: 100px;
            text-align: center;
            letter-spacing: -2px;
        }

        .stack {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .layer {
            background: #252A34;
            border: 2px solid;
            border-radius: 16px;
            padding: 40px 50px;
            position: relative;
            overflow: hidden;
        }

        .layer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 8px;
            height: 100%;
        }

        .layer-1 {
            border-color: #702DFF;
        }

        .layer-1::before {
            background: #702DFF;
        }

        .layer-2 {
            border-color: #08D9D6;
        }

        .layer-2::before {
            background: #08D9D6;
        }

        .layer-3 {
            border-color: #FF2E63;
        }

        .layer-3::before {
            background: #FF2E63;
        }

        .layer-label {
            font-size: 16px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .layer-content {
            font-size: 36px;
            font-weight: 700;
            color: #F9F7F7;
            line-height: 1.3;
        }

        .layer-content .highlight {
            font-family: 'Courier New', monospace;
            color: #08D9D6;
            font-size: 32px;
        }

        .terminal-cursor {
            display: inline-block;
            width: 16px;
            height: 40px;
            background: #FF2E63;
            margin-left: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(8, 217, 214, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(8, 217, 214, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .watermark {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            font-weight: 700;
            color: #F9F7F7;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="grid-pattern"></div>
    <div class="container">
        <h1 class="title">Construido Diferente</h1>

        <div class="stack">
            <div class="layer layer-1">
                <div class="layer-label">Capa de Modelos de IA</div>
                <div class="layer-content">
                    Claude Opus & Sonnet
                </div>
            </div>

            <div class="layer layer-2">
                <div class="layer-label">Capa de Infraestructura</div>
                <div class="layer-content">
                    <span class="highlight">OpenClaw</span>
                </div>
            </div>

            <div class="layer layer-3">
                <div class="layer-label">Capa de Aplicación</div>
                <div class="layer-content">
                    Tu Negocio<span class="terminal-cursor"></span>
                </div>
            </div>
        </div>

        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
