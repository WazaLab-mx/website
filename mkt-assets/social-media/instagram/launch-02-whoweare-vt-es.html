<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>We Are WAZA - Vertical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1350px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 80px;
            position: relative;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 70px;
            left: 80px;
            font-size: 32px;
            font-weight: 800;
            color: #F9F7F7;
            letter-spacing: 0.5px;
        }

        .header .dot {
            color: #FF2E63;
        }

        .main-title {
            font-size: 80px;
            font-weight: 900;
            color: #F9F7F7;
            text-align: center;
            margin-bottom: 70px;
            letter-spacing: -1px;
        }

        .meanings {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 80px;
        }

        .meaning-card {
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #FF2E63;
        }

        .meaning-card:nth-child(2) {
            border-left-color: #08D9D6;
        }

        .meaning-card:nth-child(3) {
            border-left-color: #702DFF;
        }

        .meaning-card:nth-child(4) {
            border-left-color: #F9F7F7;
        }

        .meaning-word {
            font-size: 38px;
            font-weight: 700;
            color: #F9F7F7;
            margin-bottom: 12px;
        }

        .meaning-origin {
            font-size: 20px;
            font-weight: 400;
            color: rgba(249, 247, 247, 0.5);
            margin-bottom: 18px;
        }

        .meaning-definition {
            font-size: 24px;
            font-weight: 500;
            color: #F9F7F7;
            line-height: 1.4;
        }

        .mission {
            text-align: center;
            margin-bottom: 50px;
        }

        .mission-text {
            font-size: 28px;
            font-weight: 400;
            color: #F9F7F7;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .tagline {
            font-size: 32px;
            font-weight: 600;
            color: #08D9D6;
            letter-spacing: -0.3px;
        }

        .gradient-line {
            width: 250px;
            height: 4px;
            background: linear-gradient(90deg, #FF2E63, #08D9D6, #702DFF);
            margin: 0 auto 60px;
        }
    </style>
</head>
<body>
    <div class="header">WAZA<span class="dot">.</span></div>

    <h1 class="main-title">Somos WAZA</h1>

    <div class="gradient-line"></div>

    <div class="meanings">
        <div class="meaning-card">
            <div class="meaning-word">技 (Waza)</div>
            <div class="meaning-origin">Japonés</div>
            <div class="meaning-definition">Técnica, habilidad, artesanía</div>
        </div>
        <div class="meaning-card">
            <div class="meaning-word">Waza</div>
            <div class="meaning-origin">Inglés</div>
            <div class="meaning-definition">Saludo, conexión</div>
        </div>
        <div class="meaning-card">
            <div class="meaning-word">Waza</div>
            <div class="meaning-origin">Swahili</div>
            <div class="meaning-definition">Pensar, imaginar, crear</div>
        </div>
        <div class="meaning-card">
            <div class="meaning-word">¡Guaza!</div>
            <div class="meaning-origin">Español</div>
            <div class="meaning-definition">Diversión, humor</div>
        </div>
    </div>

    <div class="mission">
        <p class="mission-text">Creamos herramientas de IA prácticas<br>para negocios que no se detienen</p>
        <p class="tagline">Técnica. Conexión. Imaginación. Humor.</p>
    </div>
</body>
</html>
