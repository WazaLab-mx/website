<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <title>The WAZA Promise - WAZA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            color: #F9F7F7;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 48px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #F9F7F7;
            position: relative;
        }

        .logo::before {
            content: '';
            width: 12px;
            height: 12px;
            background: #FF2E63;
            border-radius: 50%;
            position: absolute;
            top: -6px;
            right: -6px;
        }

        .badge {
            background: rgba(255, 46, 99, 0.15);
            border: 1.5px solid #FF2E63;
            color: #FF2E63;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .content {
            flex: 1;
            padding: 0 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 50px;
        }

        .title {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2px;
            color: #F9F7F7;
        }

        .promises {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .promise-item {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .check {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: #08D9D6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: #0D0D0D;
        }

        .check::after {
            content: '✓';
        }

        .promise-text {
            font-size: 30px;
            font-weight: 800;
            color: #F9F7F7;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .tagline {
            margin-top: 30px;
            padding: 40px;
            background: linear-gradient(135deg, rgba(112, 45, 255, 0.1) 0%, rgba(255, 46, 99, 0.1) 100%);
            border: 2px solid rgba(112, 45, 255, 0.3);
            border-radius: 16px;
            text-align: center;
        }

        .tagline-text {
            font-size: 36px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .tagline-highlight {
            background: linear-gradient(135deg, #702DFF 0%, #FF2E63 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .footer {
            padding: 48px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .watermark {
            font-size: 24px;
            font-weight: 700;
            color: rgba(249, 247, 247, 0.4);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">WAZA.</div>
        <div class="badge">OUR PROMISE</div>
    </div>

    <div class="content">
        <div class="title">The WAZA<br>Promise</div>

        <div class="promises">
            <div class="promise-item">
                <div class="check"></div>
                <div class="promise-text">We build it right the first time.</div>
            </div>

            <div class="promise-item">
                <div class="check"></div>
                <div class="promise-text">We ship fast without cutting corners.</div>
            </div>

            <div class="promise-item">
                <div class="check"></div>
                <div class="promise-text">We teach you to fish while giving you the fish.</div>
            </div>

            <div class="promise-item">
                <div class="check"></div>
                <div class="promise-text">We create technology that gets better over time.</div>
            </div>

            <div class="promise-item">
                <div class="check"></div>
                <div class="promise-text">We make AI practical, not theoretical.</div>
            </div>
        </div>

        <div class="tagline">
            <div class="tagline-text">
                <span class="tagline-highlight">Simple solutions</span><br>for complex problems.
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
