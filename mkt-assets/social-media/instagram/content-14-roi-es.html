<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAZA - The ROI of Going AI-Native</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 40px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -1px;
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            width: 12px;
            height: 12px;
            background: #FF2E63;
            border-radius: 50%;
        }

        .badge {
            background: #FF2E63;
            color: #0D0D0D;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .content {
            flex: 1;
            padding: 0 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .title {
            font-size: 52px;
            font-weight: 800;
            color: #F9F7F7;
            line-height: 1.1;
            margin-bottom: 60px;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 50px;
        }

        .metric {
            background: linear-gradient(135deg, #252A34 0%, #1a1d24 100%);
            padding: 40px 35px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .metric::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-color);
        }

        .metric-value {
            font-size: 72px;
            font-weight: 900;
            color: var(--accent-color);
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }

        .metric-label {
            font-size: 18px;
            font-weight: 600;
            color: #F9F7F7;
            opacity: 0.9;
            line-height: 1.4;
        }

        .metric-1 { --accent-color: #FF2E63; }
        .metric-2 { --accent-color: #08D9D6; }
        .metric-3 { --accent-color: #702DFF; }
        .metric-4 { --accent-color: #F9F7F7; }

        .quote {
            background: rgba(255, 46, 99, 0.08);
            border-left: 4px solid #FF2E63;
            padding: 25px 35px;
            border-radius: 12px;
        }

        .quote-text {
            font-size: 20px;
            font-weight: 600;
            color: #F9F7F7;
            line-height: 1.5;
            font-style: italic;
        }

        .footer {
            padding: 40px;
            text-align: center;
        }

        .watermark {
            font-size: 18px;
            font-weight: 500;
            color: #F9F7F7;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">WAZA.</div>
        <div class="badge">ROI</div>
    </div>

    <div class="content">
        <div class="title">El ROI de Ser AI-Native</div>

        <div class="metrics">
            <div class="metric metric-1">
                <div class="metric-value">60%</div>
                <div class="metric-label">Reducción en tiempo de desarrollo</div>
            </div>

            <div class="metric metric-2">
                <div class="metric-value">45%</div>
                <div class="metric-label">Aumento en engagement de usuarios</div>
            </div>

            <div class="metric metric-3">
                <div class="metric-value">3x</div>
                <div class="metric-label">Mejora en productividad</div>
            </div>

            <div class="metric metric-4">
                <div class="metric-value">80%</div>
                <div class="metric-label">Ahorro vs. agencias tradicionales</div>
            </div>
        </div>

        <div class="quote">
            <div class="quote-text">La IA no es un gasto. Es la mejor inversión que harás este año.</div>
        </div>
    </div>

    <div class="footer">
        <div class="watermark">waza.baby</div>
    </div>
</body>
</html>
