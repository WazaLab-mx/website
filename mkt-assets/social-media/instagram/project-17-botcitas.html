<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotCitas - WAZA Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #F9F7F7;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #FF2E63;
            border-radius: 50%;
        }

        .tagline {
            font-size: 13px;
            font-weight: 400;
            color: #08D9D6;
            letter-spacing: 0.5px;
        }

        .screenshot-container {
            width: 100%;
            max-width: 900px;
            margin: 20px 0;
        }

        .device-frame {
            background: linear-gradient(135deg, #252A34 0%, #1a1f2e 100%);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 1px rgba(8, 217, 214, 0.3);
            border: 1px solid rgba(8, 217, 214, 0.1);
        }

        .screenshot {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
        }

        .content {
            width: 100%;
            text-align: center;
            margin-top: 30px;
        }

        .project-title {
            font-size: 64px;
            font-weight: 800;
            color: #F9F7F7;
            letter-spacing: -1px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #F9F7F7 0%, #08D9D6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 22px;
            font-weight: 400;
            color: #b8b8b8;
            line-height: 1.5;
            max-width: 800px;
            margin: 0 auto 30px;
        }

        .tags-section {
            margin-bottom: 20px;
        }

        .tags-label {
            font-size: 12px;
            font-weight: 600;
            color: #08D9D6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tag {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(8, 217, 214, 0.1);
            color: #08D9D6;
            border: 1px solid rgba(8, 217, 214, 0.2);
        }

        .tech {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tech-item {
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(112, 45, 255, 0.1);
            color: #702DFF;
            border: 1px solid rgba(112, 45, 255, 0.2);
        }

        .url {
            font-size: 16px;
            font-weight: 500;
            font-family: 'Courier New', monospace;
            color: #FF2E63;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="branding">
                <div class="logo">WAZA</div>
                <div class="dot"></div>
            </div>
            <div class="tagline">Built by waza.baby</div>
        </div>

        <div class="screenshot-container">
            <div class="device-frame">
                <img src="../../../public/images/project-screenshots/botcitas.png" alt="BotCitas" class="screenshot">
            </div>
        </div>

        <div class="content">
            <h1 class="project-title">BotCitas</h1>
            <p class="description">WhatsApp chatbot that automates appointment scheduling 24/7. Handles bookings, confirmations & reminders. Reduces no-shows by 60%.</p>

            <div class="tags-section">
                <div class="tags-label">Category</div>
                <div class="tags">
                    <span class="tag">WhatsApp Bot</span>
                    <span class="tag">Appointment Scheduling</span>
                    <span class="tag">Business Automation</span>
                </div>
            </div>

            <div class="tech">
                <span class="tech-item">Node.js</span>
                <span class="tech-item">WhatsApp Business API</span>
                <span class="tech-item">NLP</span>
            </div>

            <div class="url">botcitas.com</div>
        </div>
    </div>
</body>
</html>
