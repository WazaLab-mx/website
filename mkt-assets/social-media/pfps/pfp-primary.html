<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400, height=400">
    <title>WAZA - Primary PFP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 400px;
            height: 400px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .circle {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #0D0D0D;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .glow-ring {
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 48%, rgba(255, 46, 99, 0.3) 49%, transparent 50%);
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .letter {
            font-size: 200px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -8px;
            line-height: 1;
        }

        .dot {
            width: 20px;
            height: 20px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 46, 99, 0.8);
        }
    </style>
</head>
<body>
    <div class="circle">
        <div class="glow-ring"></div>
        <div class="content">
            <div class="letter">W</div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
