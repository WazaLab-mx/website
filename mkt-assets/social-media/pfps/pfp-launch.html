<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400, height=400">
    <title>WAZA - Launch PFP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 400px;
            height: 400px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .circle {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1520 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .glow-ring-outer {
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 47%, rgba(255, 46, 99, 0.4) 48%, transparent 49%);
            animation: pulse 3s ease-in-out infinite;
        }

        .glow-ring-middle {
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 47%, rgba(8, 217, 214, 0.3) 48%, transparent 49%);
            animation: pulse 3s ease-in-out infinite 0.5s;
        }

        .glow-ring-inner {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 47%, rgba(112, 45, 255, 0.2) 48%, transparent 49%);
            animation: pulse 3s ease-in-out infinite 1s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .letter {
            font-size: 180px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -8px;
            line-height: 1;
            text-shadow: 0 0 40px rgba(255, 46, 99, 0.3);
        }

        .badge {
            background: linear-gradient(135deg, #FF2E63 0%, #702DFF 100%);
            color: #F9F7F7;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: -10px;
            box-shadow: 0 4px 20px rgba(255, 46, 99, 0.4);
        }

        .dot {
            width: 16px;
            height: 16px;
            background: #08D9D6;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(8, 217, 214, 0.8);
            position: absolute;
            top: 50px;
            right: 50px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 25px rgba(8, 217, 214, 0.8);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 40px rgba(8, 217, 214, 1);
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="circle">
        <div class="glow-ring-outer"></div>
        <div class="glow-ring-middle"></div>
        <div class="glow-ring-inner"></div>
        <div class="dot"></div>
        <div class="content">
            <div class="letter">W</div>
            <div class="badge">Launch</div>
        </div>
    </div>
</body>
</html>
