<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400, height=400">
    <title>WAZA - Wordmark PFP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 400px;
            height: 400px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .circle {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .accent-line {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, #FF2E63 50%, transparent 100%);
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .wordmark {
            font-size: 72px;
            font-weight: 900;
            color: #F9F7F7;
            letter-spacing: -3px;
            line-height: 1;
        }

        .dot-container {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #FF2E63;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.6);
        }

        .dot:nth-child(2) {
            background: #08D9D6;
            box-shadow: 0 0 20px rgba(8, 217, 214, 0.6);
        }
    </style>
</head>
<body>
    <div class="circle">
        <div class="accent-line"></div>
        <div class="content">
            <div class="wordmark">WAZA</div>
            <div class="dot-container">
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
</body>
</html>
