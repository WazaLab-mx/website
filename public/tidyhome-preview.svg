<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#grad1)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- House icon -->
  <g transform="translate(150, 80)">
    <!-- House structure -->
    <path d="M 80 40 L 40 10 L 0 40 L 0 100 L 160 100 L 160 40 Z" fill="#334155" opacity="0.6"/>
    <path d="M 80 10 L 40 10 L 0 40 L 20 40 L 80 0 L 140 40 L 160 40 Z" fill="#475569" opacity="0.8"/>

    <!-- Door -->
    <rect x="60" y="60" width="40" height="40" fill="#1E293B" opacity="0.8"/>

    <!-- Windows -->
    <rect x="20" y="50" width="25" height="25" fill="#3B82F6" opacity="0.4"/>
    <rect x="115" y="50" width="25" height="25" fill="#3B82F6" opacity="0.4"/>

    <!-- Window dividers -->
    <line x1="32.5" y1="50" x2="32.5" y2="75" stroke="#1E293B" stroke-width="2"/>
    <line x1="20" y1="62.5" x2="45" y2="62.5" stroke="#1E293B" stroke-width="2"/>
    <line x1="127.5" y1="50" x2="127.5" y2="75" stroke="#1E293B" stroke-width="2"/>
    <line x1="115" y1="62.5" x2="140" y2="62.5" stroke="#1E293B" stroke-width="2"/>
  </g>

  <!-- Task list card -->
  <g transform="translate(380, 60)">
    <!-- Card background -->
    <rect width="370" height="330" rx="12" fill="#1E293B" opacity="0.9"/>
    <rect width="370" height="330" rx="12" fill="url(#grad2)" opacity="0.05"/>

    <!-- Card header -->
    <rect width="370" height="60" rx="12" fill="url(#grad2)" opacity="0.2"/>
    <text x="20" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F1F5F9">
      Today's Tasks
    </text>

    <!-- Task items -->
    <!-- Task 1 - Completed -->
    <g transform="translate(0, 80)">
      <rect x="20" y="0" width="330" height="50" rx="8" fill="#0F172A" opacity="0.6"/>
      <!-- Checkmark circle -->
      <circle cx="45" cy="25" r="12" fill="url(#grad3)" opacity="0.8"/>
      <path d="M 40 25 L 43 28 L 50 21" stroke="#F1F5F9" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" text-decoration="line-through">
        Clean kitchen
      </text>
    </g>

    <!-- Task 2 - Completed -->
    <g transform="translate(0, 145)">
      <rect x="20" y="0" width="330" height="50" rx="8" fill="#0F172A" opacity="0.6"/>
      <circle cx="45" cy="25" r="12" fill="url(#grad3)" opacity="0.8"/>
      <path d="M 40 25 L 43 28 L 50 21" stroke="#F1F5F9" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" text-decoration="line-through">
        Water plants
      </text>
    </g>

    <!-- Task 3 - Active -->
    <g transform="translate(0, 210)">
      <rect x="20" y="0" width="330" height="50" rx="8" fill="#0F172A" opacity="0.6"/>
      <rect x="20" y="0" width="330" height="50" rx="8" fill="url(#grad2)" opacity="0.1"/>
      <circle cx="45" cy="25" r="12" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.6"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="16" fill="#F1F5F9">
        Vacuum living room
      </text>
      <!-- Time indicator -->
      <text x="290" y="30" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6">
        3:00 PM
      </text>
    </g>

    <!-- Task 4 - Pending -->
    <g transform="translate(0, 275)">
      <rect x="20" y="0" width="330" height="50" rx="8" fill="#0F172A" opacity="0.4"/>
      <circle cx="45" cy="25" r="12" stroke="#475569" stroke-width="2" fill="none" opacity="0.4"/>
      <text x="70" y="30" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" opacity="0.7">
        Laundry
      </text>
      <text x="290" y="30" font-family="Arial, sans-serif" font-size="12" fill="#64748B">
        5:00 PM
      </text>
    </g>
  </g>

  <!-- AI indicator -->
  <g transform="translate(60, 350)">
    <rect width="120" height="36" rx="18" fill="#3B82F6" opacity="0.2"/>
    <circle cx="30" cy="18" r="8" fill="#3B82F6">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="48" y="24" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#60A5FA">
      AI-Powered
    </text>
  </g>

  <!-- Decorative elements -->
  <circle cx="700" cy="100" r="60" fill="#3B82F6" opacity="0.05"/>
  <circle cx="100" cy="300" r="40" fill="#8B5CF6" opacity="0.05"/>

  <!-- Bottom accent line -->
  <rect x="0" y="445" width="800" height="5" fill="url(#grad2)" opacity="0.3"/>
</svg>
