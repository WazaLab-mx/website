<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e27"/>

  <!-- Grid pattern -->
  <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a1f3a" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gradient overlays -->
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Green/Blue accent circles -->
  <circle cx="150" cy="120" r="180" fill="url(#greenGrad)" opacity="0.4"/>
  <circle cx="1050" cy="500" r="220" fill="url(#blueGrad)" opacity="0.3"/>

  <!-- Chart/Graph visualization -->
  <g transform="translate(250, 150)">
    <!-- Chart container -->
    <rect x="0" y="0" width="350" height="350" rx="15" fill="#0f172a" stroke="#10b981" stroke-width="3" opacity="0.8"/>

    <!-- Candlestick chart elements -->
    <g opacity="0.9">
      <!-- Green candles (bull) -->
      <rect x="40" y="200" width="25" height="100" fill="#10b981" opacity="0.8"/>
      <line x1="52.5" y1="150" x2="52.5" y2="300" stroke="#10b981" stroke-width="2"/>

      <rect x="100" y="150" width="25" height="120" fill="#10b981" opacity="0.8"/>
      <line x1="112.5" y1="120" x2="112.5" y2="270" stroke="#10b981" stroke-width="2"/>

      <rect x="220" y="100" width="25" height="140" fill="#10b981" opacity="0.8"/>
      <line x1="232.5" y1="70" x2="232.5" y2="240" stroke="#10b981" stroke-width="2"/>

      <!-- Red candles (bear) -->
      <rect x="160" y="180" width="25" height="80" fill="#ef4444" opacity="0.7"/>
      <line x1="172.5" y1="160" x2="172.5" y2="260" stroke="#ef4444" stroke-width="2"/>

      <rect x="280" y="120" width="25" height="90" fill="#ef4444" opacity="0.7"/>
      <line x1="292.5" y1="100" x2="292.5" y2="210" stroke="#ef4444" stroke-width="2"/>
    </g>

    <!-- Trend line overlay -->
    <polyline points="40,240 90,200 140,220 190,160 240,120 290,140"
              stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.8"/>

    <!-- Chart labels -->
    <text x="20" y="330" font-family="monospace" font-size="18" fill="#64748b">BTC</text>
    <text x="280" y="330" font-family="monospace" font-size="18" fill="#64748b">ETH</text>
  </g>

  <!-- Telegram icon -->
  <g transform="translate(260, 80)">
    <circle cx="0" cy="0" r="35" fill="#0088cc" opacity="0.9"/>
    <path d="M -15 0 L 12 -8 L 12 8 Z" fill="#ffffff" transform="rotate(45)"/>
  </g>

  <!-- Crypto symbols -->
  <g transform="translate(550, 200)">
    <!-- Bitcoin symbol -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#f7931a" stroke-width="3" opacity="0.7"/>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="36" font-weight="bold"
          fill="#f7931a" text-anchor="middle" opacity="0.7">₿</text>
  </g>

  <!-- Waza Stonks text -->
  <text x="650" y="270" font-family="Arial, sans-serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="start">
    Waza Stonks
  </text>

  <!-- Tagline -->
  <text x="650" y="330" font-family="Arial, sans-serif" font-size="26" fill="#10b981" text-anchor="start">
    Market Insights • Twice Daily
  </text>

  <!-- AI + Telegram Badge -->
  <g transform="translate(650, 365)">
    <rect x="0" y="0" width="240" height="55" rx="28" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <text x="120" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">
      AI-Powered Bot
    </text>
  </g>

  <!-- Market indicators -->
  <g transform="translate(900, 365)">
    <circle cx="0" cy="27" r="6" fill="#10b981"/>
    <text x="15" y="35" font-family="monospace" font-size="18" fill="#10b981">Live</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="640" cy="392" r="4" fill="#10b981" opacity="0.8"/>
  <circle cx="960" cy="392" r="4" fill="#3b82f6" opacity="0.8"/>

  <!-- Floating numbers (representing data) -->
  <text x="950" y="180" font-family="monospace" font-size="20" fill="#10b981" opacity="0.5">+24.5%</text>
  <text x="950" y="220" font-family="monospace" font-size="20" fill="#10b981" opacity="0.5">↑ 5.2K</text>
  <text x="1050" y="260" font-family="monospace" font-size="20" fill="#ef4444" opacity="0.5">-3.1%</text>
</svg>
