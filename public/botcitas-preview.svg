<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#25D366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#128C7E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#25D366;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#grad1)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- WhatsApp Phone Mockup -->
  <g transform="translate(80, 40)">
    <!-- Phone frame -->
    <rect width="200" height="360" rx="24" fill="#1E293B" opacity="0.9"/>
    <rect x="8" y="40" width="184" height="280" rx="4" fill="#0F172A"/>

    <!-- Phone notch -->
    <rect x="60" y="10" width="80" height="24" rx="12" fill="#0F172A"/>

    <!-- WhatsApp header -->
    <rect x="8" y="40" width="184" height="50" fill="#128C7E"/>
    <text x="20" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">BotCitas</text>
    <circle cx="170" cy="65" r="16" fill="#25D366" opacity="0.3"/>

    <!-- Chat messages -->
    <!-- Bot message -->
    <g transform="translate(16, 100)">
      <rect width="140" height="45" rx="8" fill="#25D366" opacity="0.2"/>
      <text x="10" y="20" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Hola! Elige tu hora:</text>
      <text x="10" y="36" font-family="Arial, sans-serif" font-size="10" fill="#64748B">10:00 | 11:00 | 14:00</text>
    </g>

    <!-- User message -->
    <g transform="translate(50, 160)">
      <rect width="130" height="30" rx="8" fill="#3B82F6" opacity="0.3"/>
      <text x="12" y="20" font-family="Arial, sans-serif" font-size="11" fill="#F1F5F9">11:00 AM por favor</text>
    </g>

    <!-- Bot confirmation -->
    <g transform="translate(16, 205)">
      <rect width="155" height="55" rx="8" fill="#25D366" opacity="0.2"/>
      <text x="10" y="20" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Confirmado!</text>
      <text x="10" y="36" font-family="Arial, sans-serif" font-size="10" fill="#25D366">Cita: Lunes 11:00 AM</text>
      <text x="10" y="48" font-family="Arial, sans-serif" font-size="9" fill="#64748B">Te enviaremos recordatorio</text>
    </g>
  </g>

  <!-- Calendar Card -->
  <g transform="translate(340, 50)">
    <rect width="400" height="280" rx="16" fill="#1E293B" opacity="0.9"/>

    <!-- Header -->
    <rect width="400" height="60" rx="16" fill="url(#grad2)" opacity="0.2"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#F1F5F9">Appointment Calendar</text>

    <!-- Calendar grid -->
    <g transform="translate(20, 80)">
      <!-- Days header -->
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Mon</text>
      <text x="52" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Tue</text>
      <text x="104" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Wed</text>
      <text x="156" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Thu</text>
      <text x="208" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Fri</text>

      <!-- Date slots row 1 -->
      <rect x="0" y="20" width="44" height="44" rx="8" fill="#25D366" opacity="0.3"/>
      <text x="16" y="48" font-family="Arial, sans-serif" font-size="16" fill="#25D366">15</text>

      <rect x="52" y="20" width="44" height="44" rx="8" fill="#0F172A" opacity="0.6"/>
      <text x="68" y="48" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8">16</text>

      <rect x="104" y="20" width="44" height="44" rx="8" fill="#3B82F6" opacity="0.2"/>
      <text x="118" y="48" font-family="Arial, sans-serif" font-size="16" fill="#3B82F6">17</text>

      <rect x="156" y="20" width="44" height="44" rx="8" fill="#0F172A" opacity="0.6"/>
      <text x="172" y="48" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8">18</text>

      <rect x="208" y="20" width="44" height="44" rx="8" fill="#25D366" opacity="0.3"/>
      <text x="222" y="48" font-family="Arial, sans-serif" font-size="16" fill="#25D366">19</text>
    </g>

    <!-- Appointment list -->
    <g transform="translate(20, 170)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#94A3B8">Today's Bookings</text>

      <rect x="0" y="16" width="360" height="36" rx="6" fill="#0F172A" opacity="0.6"/>
      <circle cx="20" cy="34" r="6" fill="#25D366"/>
      <text x="36" y="38" font-family="Arial, sans-serif" font-size="12" fill="#F1F5F9">09:00 - Maria Garcia</text>
      <text x="280" y="38" font-family="Arial, sans-serif" font-size="11" fill="#25D366">Confirmed</text>

      <rect x="0" y="58" width="360" height="36" rx="6" fill="#0F172A" opacity="0.6"/>
      <circle cx="20" cy="76" r="6" fill="#3B82F6"/>
      <text x="36" y="80" font-family="Arial, sans-serif" font-size="12" fill="#F1F5F9">11:00 - Carlos Lopez</text>
      <text x="290" y="80" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">Pending</text>
    </g>
  </g>

  <!-- Stats badges -->
  <g transform="translate(340, 360)">
    <rect width="120" height="40" rx="20" fill="#25D366" opacity="0.2"/>
    <text x="16" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#25D366">24/7 Active</text>
  </g>

  <g transform="translate(480, 360)">
    <rect width="140" height="40" rx="20" fill="#3B82F6" opacity="0.2"/>
    <text x="16" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#60A5FA">-60% No-shows</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="720" cy="80" r="50" fill="#25D366" opacity="0.05"/>
  <circle cx="80" cy="420" r="30" fill="#128C7E" opacity="0.05"/>

  <!-- Bottom accent line -->
  <rect x="0" y="445" width="800" height="5" fill="url(#grad2)" opacity="0.3"/>
</svg>