<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <g fill="#3b82f6" opacity="0.12">
    <circle cx="300" cy="315" r="120"/>
    <circle cx="900" cy="315" r="120"/>
    <ellipse cx="600" cy="315" rx="200" ry="200"/>
  </g>
  
  <g fill="#10b981" opacity="0.10">
    <circle cx="600" cy="160" r="80"/>
    <circle cx="600" cy="470" r="60"/>
  </g>
  
  <!-- Document/PDF representation on left -->
  <g opacity="0.3">
    <rect x="200" y="200" width="120" height="160" rx="4" fill="#3b82f6" transform="rotate(-5 260 280)"/>
    <rect x="220" y="220" width="120" height="160" rx="4" fill="#2563eb" transform="rotate(-2 280 300)"/>
    <rect x="240" y="240" width="120" height="160" rx="4" fill="url(#blueGradient)"/>
    <line x1="250" y1="260" x2="350" y2="260" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="250" y1="280" x2="340" y2="280" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="250" y1="300" x2="330" y2="300" stroke="white" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Arrow/Transformation -->
  <g opacity="0.6">
    <path d="M 500 320 L 700 320" stroke="url(#greenGradient)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <circle cx="600" cy="320" r="20" fill="#10b981" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Excel/Spreadsheet representation on right -->
  <g opacity="0.3">
    <rect x="840" y="200" width="160" height="200" rx="4" fill="#10b981"/>
    <line x1="860" y1="230" x2="980" y2="230" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="860" y1="260" x2="980" y2="260" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="860" y1="290" x2="980" y2="290" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="860" y1="320" x2="980" y2="320" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="860" y1="350" x2="980" y2="350" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="900" y1="200" x2="900" y2="400" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="940" y1="200" x2="940" y2="400" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="980" y1="200" x2="980" y2="400" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Main title with shadow for better visibility -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="58" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="-1" filter="url(#textShadow)">Estado de Cuenta</text>
  
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="58" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="-1" filter="url(#textShadow)">PDF a Excel</text>
  
  <!-- Subtitle -->
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="28" fill="#10b981" text-anchor="middle" font-weight="600" opacity="0.95" filter="url(#textShadow)">OCR Inteligente con IA</text>
  
  <!-- Decorative lines -->
  <rect x="250" y="200" width="700" height="3" rx="1.5" fill="url(#blueGradient)" opacity="0.4"/>
  <rect x="250" y="430" width="700" height="3" rx="1.5" fill="url(#greenGradient)" opacity="0.4"/>
</svg>

