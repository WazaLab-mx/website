<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fbGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1877F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B5998;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tiktokGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F2EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0050;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#grad1)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- Search interface card -->
  <g transform="translate(50, 40)">
    <rect width="380" height="370" rx="16" fill="#1E293B" opacity="0.9"/>

    <!-- Header -->
    <rect width="380" height="60" rx="16" fill="url(#grad2)" opacity="0.2"/>
    <text x="24" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">AdScout</text>
    <text x="120" y="38" font-family="Arial, sans-serif" font-size="14" fill="#F97316">Winning Ad Finder</text>

    <!-- Search bar -->
    <g transform="translate(20, 80)">
      <rect width="340" height="45" rx="8" fill="#0F172A"/>
      <text x="16" y="28" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Enter niche: "fitness supplements"</text>
      <rect x="290" y="8" width="40" height="30" rx="6" fill="url(#grad2)" opacity="0.8"/>
      <text x="303" y="28" font-family="Arial, sans-serif" font-size="14" fill="white">&#128269;</text>
    </g>

    <!-- Platform selection -->
    <g transform="translate(20, 145)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">PLATFORMS</text>

      <rect x="0" y="15" width="100" height="36" rx="8" fill="url(#fbGrad)" opacity="0.3"/>
      <text x="15" y="38" font-family="Arial, sans-serif" font-size="13" fill="#1877F2">Facebook</text>

      <rect x="115" y="15" width="90" height="36" rx="8" fill="url(#tiktokGrad)" opacity="0.3"/>
      <text x="130" y="38" font-family="Arial, sans-serif" font-size="13" fill="#00F2EA">TikTok</text>

      <rect x="220" y="15" width="60" height="36" rx="8" fill="#374151" opacity="0.5"/>
      <text x="235" y="38" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8">Both</text>
    </g>

    <!-- Results preview -->
    <g transform="translate(20, 210)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">TOP WINNING ADS</text>

      <!-- Ad result 1 -->
      <rect x="0" y="15" width="340" height="50" rx="8" fill="#0F172A" opacity="0.8"/>
      <rect x="10" y="23" width="34" height="34" rx="4" fill="#1877F2" opacity="0.3"/>
      <text x="20" y="46" font-family="Arial, sans-serif" font-size="14" fill="#1877F2">f</text>
      <text x="55" y="38" font-family="Arial, sans-serif" font-size="12" fill="#F1F5F9">Protein Shake - 45 days running</text>
      <text x="55" y="54" font-family="Arial, sans-serif" font-size="10" fill="#10B981">High performer</text>

      <!-- Ad result 2 -->
      <rect x="0" y="75" width="340" height="50" rx="8" fill="#0F172A" opacity="0.8"/>
      <rect x="10" y="83" width="34" height="34" rx="4" fill="#FF0050" opacity="0.3"/>
      <text x="17" y="106" font-family="Arial, sans-serif" font-size="14" fill="#FF0050">TT</text>
      <text x="55" y="98" font-family="Arial, sans-serif" font-size="12" fill="#F1F5F9">Pre-workout Energy - Viral</text>
      <text x="55" y="114" font-family="Arial, sans-serif" font-size="10" fill="#F97316">2.3M views</text>
    </g>
  </g>

  <!-- AI Insights panel -->
  <g transform="translate(460, 40)">
    <rect width="300" height="280" rx="16" fill="#1E293B" opacity="0.9"/>

    <!-- Header -->
    <rect width="300" height="50" rx="16" fill="#8B5CF6" opacity="0.2"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F1F5F9">AI Insights</text>
    <circle cx="270" cy="25" r="10" fill="#8B5CF6">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Insights list -->
    <g transform="translate(20, 70)">
      <rect width="260" height="55" rx="8" fill="#0F172A" opacity="0.6"/>
      <text x="12" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#F97316">Winning Hook:</text>
      <text x="12" y="40" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">"Stop scrolling if you want..."</text>

      <rect y="65" width="260" height="55" rx="8" fill="#0F172A" opacity="0.6"/>
      <text x="12" y="87" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#10B981">Key Trigger:</text>
      <text x="12" y="105" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Pain point + social proof</text>

      <rect y="130" width="260" height="55" rx="8" fill="#0F172A" opacity="0.6"/>
      <text x="12" y="152" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#3B82F6">Format:</text>
      <text x="12" y="170" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">UGC testimonial style</text>
    </g>
  </g>

  <!-- Stats -->
  <g transform="translate(460, 340)">
    <rect width="140" height="60" rx="12" fill="#10B981" opacity="0.15"/>
    <text x="16" y="28" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10B981">30+</text>
    <text x="16" y="48" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Days running</text>

    <rect x="160" y="0" width="140" height="60" rx="12" fill="#F97316" opacity="0.15"/>
    <text x="176" y="28" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#F97316">5x</text>
    <text x="176" y="48" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Faster research</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="750" cy="100" r="50" fill="#F97316" opacity="0.05"/>
  <circle cx="50" cy="400" r="30" fill="#EF4444" opacity="0.05"/>

  <!-- Bottom accent line -->
  <rect x="0" y="445" width="800" height="5" fill="url(#grad2)" opacity="0.3"/>
</svg>