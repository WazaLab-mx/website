<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#grad1)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- Main calculator card -->
  <g transform="translate(50, 30)">
    <rect width="420" height="390" rx="16" fill="#1E293B" opacity="0.9"/>

    <!-- Header -->
    <rect width="420" height="60" rx="16" fill="url(#grad2)" opacity="0.2"/>
    <text x="24" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F1F5F9">Strategic Alliance Calculator</text>

    <!-- Input sections -->
    <g transform="translate(20, 80)">
      <!-- Retainer section -->
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">RETAINER CONFIGURATION</text>

      <rect x="0" y="15" width="180" height="45" rx="8" fill="#0F172A" opacity="0.8"/>
      <text x="12" y="35" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Monthly Retainer</text>
      <text x="12" y="52" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10B981">$15,000</text>

      <rect x="195" y="15" width="180" height="45" rx="8" fill="#0F172A" opacity="0.8"/>
      <text x="207" y="35" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Hourly Rate</text>
      <text x="207" y="52" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3B82F6">$150/hr</text>
    </g>

    <!-- IP Split visualization -->
    <g transform="translate(20, 160)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">IP OWNERSHIP SPLIT</text>

      <rect x="0" y="15" width="380" height="30" rx="6" fill="#0F172A"/>
      <rect x="0" y="15" width="228" height="30" rx="6" fill="url(#grad2)" opacity="0.6"/>
      <rect x="228" y="15" width="152" height="30" rx="6" fill="url(#grad3)" opacity="0.6"/>

      <text x="100" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="white">60% Studio</text>
      <text x="280" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="white">40% Agency</text>
    </g>

    <!-- Equity section -->
    <g transform="translate(20, 220)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">EQUITY OPTIONS</text>

      <rect x="0" y="15" width="120" height="55" rx="8" fill="#0F172A" opacity="0.8"/>
      <text x="12" y="35" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Vesting Period</text>
      <text x="12" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8B5CF6">4 yrs</text>

      <rect x="135" y="15" width="120" height="55" rx="8" fill="#0F172A" opacity="0.8"/>
      <text x="147" y="35" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Cliff</text>
      <text x="147" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F59E0B">1 yr</text>

      <rect x="270" y="15" width="110" height="55" rx="8" fill="#0F172A" opacity="0.8"/>
      <text x="282" y="35" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Options Pool</text>
      <text x="282" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#EC4899">2.5%</text>
    </g>

    <!-- Deal health score -->
    <g transform="translate(20, 310)">
      <rect width="380" height="60" rx="10" fill="#10B981" opacity="0.15"/>
      <text x="16" y="25" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">DEAL HEALTH SCORE</text>
      <text x="16" y="48" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10B981">87/100 - Excellent</text>
      <text x="330" y="40" font-family="Arial, sans-serif" font-size="24" fill="#10B981">&#10003;</text>
    </g>
  </g>

  <!-- Analysis panel -->
  <g transform="translate(500, 30)">
    <rect width="260" height="250" rx="16" fill="#1E293B" opacity="0.9"/>

    <rect width="260" height="50" rx="16" fill="url(#grad3)" opacity="0.2"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F1F5F9">Risk Analysis</text>

    <g transform="translate(20, 70)">
      <rect width="220" height="40" rx="6" fill="#0F172A" opacity="0.6"/>
      <circle cx="20" cy="20" r="8" fill="#10B981"/>
      <text x="40" y="25" font-family="Arial, sans-serif" font-size="12" fill="#F1F5F9">Payment terms</text>
      <text x="180" y="25" font-family="Arial, sans-serif" font-size="11" fill="#10B981">Low</text>

      <rect y="50" width="220" height="40" rx="6" fill="#0F172A" opacity="0.6"/>
      <circle cx="20" cy="70" r="8" fill="#F59E0B"/>
      <text x="40" y="75" font-family="Arial, sans-serif" font-size="12" fill="#F1F5F9">IP disputes</text>
      <text x="175" y="75" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B">Med</text>

      <rect y="100" width="220" height="40" rx="6" fill="#0F172A" opacity="0.6"/>
      <circle cx="20" cy="120" r="8" fill="#10B981"/>
      <text x="40" y="125" font-family="Arial, sans-serif" font-size="12" fill="#F1F5F9">Exit strategy</text>
      <text x="180" y="125" font-family="Arial, sans-serif" font-size="11" fill="#10B981">Low</text>
    </g>
  </g>

  <!-- Export options -->
  <g transform="translate(500, 300)">
    <rect width="260" height="120" rx="16" fill="#1E293B" opacity="0.9"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">EXPORT OPTIONS</text>

    <rect x="20" y="45" width="100" height="35" rx="6" fill="#EF4444" opacity="0.2"/>
    <text x="45" y="68" font-family="Arial, sans-serif" font-size="12" fill="#EF4444">PDF</text>

    <rect x="135" y="45" width="100" height="35" rx="6" fill="#3B82F6" opacity="0.2"/>
    <text x="160" y="68" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6">JSON</text>

    <rect x="20" y="85" width="215" height="25" rx="6" fill="#10B981" opacity="0.2"/>
    <text x="75" y="102" font-family="Arial, sans-serif" font-size="11" fill="#10B981">Generate Contract</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="750" cy="100" r="50" fill="#10B981" opacity="0.05"/>
  <circle cx="50" cy="420" r="30" fill="#3B82F6" opacity="0.05"/>

  <!-- Bottom accent line -->
  <rect x="0" y="445" width="800" height="5" fill="url(#grad2)" opacity="0.3"/>
</svg>